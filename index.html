<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prado Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#050c0a; --bg2:#0a1512; --panel:#0f1e19; --panel2:#152b24; --panel3:#1c3a32; --line:#1e3830;
  --line2:#2a5548;
  --ink:#eaf5f0; --muted:#7ea294; --dim:#5a7770;
  --accent:#10b981; --accent2:#a3e635; --accent3:#4ade80; --accent-dark:#0f3d2c;
  --glow:0 0 0 1px rgba(16,185,129,.08), 0 8px 32px rgba(16,185,129,.06);
  --glow-strong:0 0 0 1px rgba(163,230,53,.15), 0 12px 40px rgba(16,185,129,.15), 0 4px 12px rgba(0,0,0,.4);
  --grad-accent:linear-gradient(135deg,#10b981 0%, #a3e635 100%);
  --grad-accent-soft:linear-gradient(135deg,rgba(16,185,129,.15) 0%, rgba(163,230,53,.1) 100%);
  --grad-panel:linear-gradient(160deg,#132521 0%, #0d1815 100%);
  --gold:#f5c451; --danger:#f87171; --radius:14px;
  --wa-in:#1f3d34; --wa-out:#005c4b;
  --sidebar-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;line-height:1.5;overflow-x:hidden;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(16,185,129,.06) 0%, transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(163,230,53,.04) 0%, transparent 45%),
    radial-gradient(circle at 50% 0%, rgba(16,185,129,.03) 0%, transparent 60%);
  background-attachment:fixed;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:radial-gradient(circle at 1px 1px, rgba(163,230,53,.04) 1px, transparent 0);
  background-size:32px 32px;
}
h1,h2,h3,.brand,.nav-item,.stage-title,.page-title,.kpi-num{font-family:'Poppins',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{height:10px;width:10px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
img{max-width:100%;display:block}

/* ============ LAYOUT PRINCIPAL ============ */
.app{display:flex;min-height:100vh;position:relative;z-index:1}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:linear-gradient(180deg,#0f1e19 0%, #0a1512 100%);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:30;
  box-shadow:1px 0 0 rgba(16,185,129,.05), 8px 0 32px rgba(0,0,0,.3);
}
.sidebar::before{
  content:''; position:absolute; top:0; right:0; bottom:0; width:1px;
  background:linear-gradient(180deg, transparent 0%, rgba(163,230,53,.2) 40%, rgba(16,185,129,.15) 60%, transparent 100%);
}
.sidebar .brand{padding:24px 20px 26px;display:flex;align-items:center;gap:13px}
.sidebar .brand .logo{
  width:44px;height:44px;border-radius:12px;
  background:var(--grad-accent);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:#052e21;
  box-shadow:
    0 0 0 1px rgba(163,230,53,.3),
    0 4px 20px rgba(16,185,129,.5),
    0 0 40px rgba(163,230,53,.2),
    inset 0 -2px 4px rgba(0,0,0,.15);
  position:relative;
}
.sidebar .brand .logo::after{
  content:''; position:absolute; inset:1px; border-radius:11px;
  background:linear-gradient(180deg, rgba(255,255,255,.2) 0%, transparent 50%);
  pointer-events:none;
}
.sidebar .brand .txt{display:flex;flex-direction:column;line-height:1.1}
.sidebar .brand .txt .n1{font-weight:700;font-size:20px;color:var(--ink)}
.sidebar .brand .txt .n2{font-weight:600;font-size:14px;color:var(--accent);text-shadow:0 0 12px rgba(16,185,129,.5)}
.nav{display:flex;flex-direction:column;gap:5px;padding:10px 14px;flex:1}
.nav-item{
  display:flex;align-items:center;gap:14px;padding:12px 15px;border-radius:12px;color:var(--muted);
  font-weight:600;font-size:14px;cursor:pointer;transition:all .18s ease;text-align:left;
  position:relative;
}
.nav-item:hover{background:rgba(16,185,129,.06);color:var(--ink)}
.nav-item.active{
  background:linear-gradient(135deg, rgba(16,185,129,.18) 0%, rgba(163,230,53,.08) 100%);
  color:var(--accent2);
  box-shadow:
    0 0 0 1px rgba(163,230,53,.2),
    0 4px 16px rgba(16,185,129,.15),
    inset 0 1px 0 rgba(163,230,53,.1);
  text-shadow:0 0 8px rgba(163,230,53,.4);
}
.nav-item.active::before{
  content:''; position:absolute; left:-2px; top:20%; bottom:20%; width:3px;
  background:var(--grad-accent); border-radius:0 3px 3px 0;
  box-shadow:0 0 12px rgba(163,230,53,.6);
}
.nav-item .ni{width:20px;height:20px;flex-shrink:0;font-size:17px;filter:drop-shadow(0 0 4px rgba(163,230,53,.15))}
.nav-item.active .ni{filter:drop-shadow(0 0 8px rgba(163,230,53,.5))}
.nav-item .badge{background:var(--danger);color:#fff;font-size:10.5px;border-radius:999px;padding:1px 7px;margin-left:auto;font-weight:700;box-shadow:0 0 12px rgba(248,113,113,.5)}
.nav-item.soon{opacity:.5}
.nav-item.soon::after{content:'em breve';font-size:10px;background:var(--panel2);color:var(--dim);padding:2px 7px;border-radius:6px;margin-left:auto;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.user-box{padding:16px 16px 20px;border-top:1px solid var(--line);display:flex;align-items:center;gap:12px;background:linear-gradient(180deg, transparent 0%, rgba(0,0,0,.2) 100%)}
.user-box .avatar{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,#1a3a30,#0f1f1a);
  color:var(--accent2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13.5px;flex-shrink:0;
  box-shadow:0 0 0 1px rgba(163,230,53,.15), inset 0 1px 0 rgba(163,230,53,.08);
}
.user-box .info{flex:1;min-width:0;line-height:1.2}
.user-box .info .n{font-size:13.5px;font-weight:600}
.user-box .info .r{font-size:11.5px;color:var(--accent);text-shadow:0 0 6px rgba(16,185,129,.3)}
.user-box .chev{color:var(--muted);font-size:12px}

.main{margin-left:var(--sidebar-w);flex:1;min-width:0;padding:26px 34px 44px;position:relative;z-index:2}

/* ============ DASHBOARD ============ */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:22px}
.kpi{
  background:var(--grad-panel);
  border:1px solid var(--line);
  border-radius:16px;padding:20px 22px;display:flex;flex-direction:column;gap:10px;
  box-shadow:var(--glow);
  position:relative;overflow:hidden;
  transition:transform .2s, box-shadow .2s;
}
.kpi::before{
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(163,230,53,.4), transparent);
}
.kpi::after{
  content:''; position:absolute; top:-40%; right:-30%; width:200px; height:200px;
  background:radial-gradient(circle, rgba(16,185,129,.08) 0%, transparent 60%);
  pointer-events:none;
}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--glow-strong)}
.kpi .top{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13.5px;font-weight:500;position:relative;z-index:1}
.kpi .top .ic{
  width:42px;height:42px;border-radius:12px;
  background:var(--grad-accent-soft);
  color:var(--accent2);
  display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;
  box-shadow:
    0 0 0 1px rgba(163,230,53,.2),
    inset 0 1px 0 rgba(163,230,53,.15),
    0 4px 12px rgba(16,185,129,.15);
  filter:drop-shadow(0 0 8px rgba(163,230,53,.3));
}
.kpi .kpi-num{
  font-size:32px;font-weight:700;color:var(--ink);letter-spacing:-.5px;
  position:relative;z-index:1;
  text-shadow:0 0 20px rgba(163,230,53,.15);
}
.kpi .delta{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:4px;position:relative;z-index:1}
.kpi .delta .up{color:var(--accent2);font-weight:600;text-shadow:0 0 8px rgba(163,230,53,.4)}
.kpi .delta .down{color:var(--danger);font-weight:600}

.dash-grid{display:grid;grid-template-columns:1fr;gap:18px;margin-bottom:18px}
.card-block{
  background:var(--grad-panel);
  border:1px solid var(--line);
  border-radius:16px;padding:22px 24px;
  box-shadow:var(--glow);
  position:relative;overflow:hidden;
}
.card-block::before{
  content:''; position:absolute; top:0; left:20px; right:20px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(163,230,53,.25), transparent);
}
.card-block .ch{display:flex;align-items:center;gap:12px;margin-bottom:20px;position:relative;z-index:1}
.card-block .ch h3{font-size:16px;font-weight:600;flex:1}
.card-block .ch .filter{font-size:12.5px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);padding:6px 12px;border-radius:9px;cursor:pointer;transition:border-color .2s}
.card-block .ch .filter:hover{border-color:var(--accent);color:var(--ink)}

/* gráfico barras horizontais com glow */
.bar-list{display:flex;flex-direction:column;gap:14px;position:relative;z-index:1}
.bar-row{display:grid;grid-template-columns:150px 1fr 60px;align-items:center;gap:14px}
.bar-row .lbl{font-size:13px;color:var(--muted);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .btrack{
  height:22px;background:rgba(20,40,34,.5);border-radius:11px;overflow:hidden;position:relative;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.3), inset 0 0 0 1px rgba(163,230,53,.05);
}
.bar-row .bfill{
  height:100%;
  background:linear-gradient(90deg,#0d9668 0%, #10b981 50%, #a3e635 100%);
  border-radius:11px;transition:width .6s ease-out;
  box-shadow:
    0 0 12px rgba(163,230,53,.4),
    inset 0 1px 0 rgba(163,230,53,.3),
    inset 0 -1px 0 rgba(0,0,0,.1);
  position:relative;
}
.bar-row .bfill::after{
  content:''; position:absolute; top:0; left:0; right:0; height:50%;
  background:linear-gradient(180deg, rgba(255,255,255,.15) 0%, transparent 100%);
  border-radius:11px 11px 0 0;
}
.bar-row .val{font-size:14px;color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums;text-shadow:0 0 8px rgba(163,230,53,.2)}
.bar-scale{margin-top:12px;padding-left:164px;display:flex;justify-content:space-between;color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums}

/* Resumo do Funil */
.summary{
  background:var(--grad-panel);
  border:1px solid var(--line);
  border-radius:16px;padding:20px 24px;margin-top:18px;
  box-shadow:var(--glow);
  position:relative;overflow:hidden;
}
.summary::before{
  content:''; position:absolute; top:0; left:20px; right:20px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(163,230,53,.25), transparent);
}
.summary h3{font-size:15px;font-weight:600;margin-bottom:16px;position:relative;z-index:1}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;position:relative;z-index:1}
.sum-cell{display:flex;align-items:center;gap:14px}
.sum-cell .ic{
  width:46px;height:46px;border-radius:12px;
  background:var(--grad-accent-soft);
  color:var(--accent2);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
  box-shadow:
    0 0 0 1px rgba(163,230,53,.15),
    inset 0 1px 0 rgba(163,230,53,.1),
    0 4px 12px rgba(16,185,129,.1);
  filter:drop-shadow(0 0 6px rgba(163,230,53,.2));
}
.sum-cell .txt .v{font-size:20px;font-weight:700;color:var(--ink);line-height:1.1;text-shadow:0 0 12px rgba(163,230,53,.12)}
.sum-cell .txt .l{font-size:12px;color:var(--muted);margin-top:3px}

/* Page header */
.pheader{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.page-title{font-size:30px;font-weight:600;letter-spacing:-.5px;text-shadow:0 0 20px rgba(163,230,53,.1)}
.pheader .spacer{flex:1}
.searchbar{
  background:rgba(15,30,25,.6);
  border:1px solid var(--line);
  color:var(--ink);
  padding:11px 14px 11px 42px;border-radius:12px;width:100%;max-width:100%;
  transition:border-color .2s, box-shadow .2s;
  backdrop-filter:blur(10px);
}
.searchwrap{position:relative;flex:1;max-width:440px}
.searchwrap::before{content:'⌕';position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px;z-index:1;pointer-events:none}
.searchbar::placeholder{color:var(--muted)}
.searchbar:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,185,129,.1), 0 0 20px rgba(16,185,129,.15)}
.pheader .icb{
  width:44px;height:44px;
  border:1px solid var(--line);border-radius:12px;
  background:rgba(15,30,25,.6);
  color:var(--muted);display:inline-flex;align-items:center;justify-content:center;font-size:18px;position:relative;
  backdrop-filter:blur(10px);
  transition:all .2s;
}
.pheader .icb:hover{color:var(--ink);border-color:var(--accent);box-shadow:0 0 20px rgba(16,185,129,.15)}
.pheader .icb .ping{position:absolute;top:10px;right:10px;width:8px;height:8px;background:var(--accent2);border-radius:50%;box-shadow:0 0 8px rgba(163,230,53,.6), 0 0 0 2px var(--bg)}

/* ============ BOTÕES E COMPONENTES REUSADOS ============ */
.btn{
  background:var(--grad-accent);color:#052e21;font-weight:700;padding:11px 18px;border-radius:12px;font-size:13.5px;
  box-shadow:
    0 4px 16px rgba(16,185,129,.3),
    0 0 0 1px rgba(163,230,53,.3),
    inset 0 1px 0 rgba(255,255,255,.2);
  transition:transform .15s, box-shadow .15s;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(16,185,129,.4), 0 0 0 1px rgba(163,230,53,.4), inset 0 1px 0 rgba(255,255,255,.25)}
.btn.ghost{background:rgba(21,43,36,.6);color:var(--ink);box-shadow:0 0 0 1px var(--line);border:none}
.btn.ghost:hover{box-shadow:0 0 0 1px var(--accent), 0 0 16px rgba(16,185,129,.15)}
.btn.sm{padding:7px 13px;font-size:12.5px;border-radius:10px}
.btn.danger{background:transparent;color:var(--danger);border:1px solid #3a2626;box-shadow:none}
.btn.danger:hover{background:rgba(248,113,113,.08)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600;background:rgba(21,43,36,.7);color:var(--muted);border:1px solid rgba(163,230,53,.08)}
.tag-neg{background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(163,230,53,.1));color:var(--accent2);border-color:rgba(163,230,53,.25);text-shadow:0 0 8px rgba(163,230,53,.2)}
.muted{color:var(--muted)}

/* pipeline */
.board{display:flex;gap:16px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
.col{
  background:var(--grad-panel);
  border:1px solid var(--line);
  border-radius:16px;min-width:280px;width:280px;flex:0 0 auto;display:flex;flex-direction:column;max-height:calc(100vh - 200px);
  box-shadow:var(--glow);
  position:relative;overflow:hidden;
}
.col::before{
  content:''; position:absolute; top:0; left:20px; right:20px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(163,230,53,.2), transparent);
}
.col-head{padding:14px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line);position:relative;z-index:1}
.col-head .dotc{width:9px;height:9px;border-radius:50%;box-shadow:0 0 8px currentColor}
.stage-title{font-weight:600;font-size:13.5px;flex:1}
.col-count{font-size:12px;color:var(--muted);background:rgba(21,43,36,.7);padding:2px 9px;border-radius:999px;border:1px solid rgba(163,230,53,.1)}
.col-body{padding:11px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;flex:1;min-height:60px;position:relative;z-index:1}
.col-body.drag-over{background:rgba(163,230,53,.04)}
.card{
  background:rgba(21,43,36,.5);
  border:1px solid var(--line);
  border-radius:12px;padding:12px 13px;cursor:grab;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  transition:transform .15s, box-shadow .15s, border-color .15s;
}
.card:hover{border-color:var(--line2);box-shadow:0 4px 16px rgba(16,185,129,.1), 0 0 0 1px rgba(163,230,53,.1)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.45}
.card .nome{font-weight:600;font-size:14px}
.card .meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;align-items:center}
.card .valor{color:var(--accent2);font-weight:700;font-size:12.5px;text-shadow:0 0 6px rgba(163,230,53,.25)}
.card-actions{display:flex;gap:6px;margin-top:10px}
.iconbtn{background:rgba(15,30,25,.6);border:1px solid var(--line);color:var(--muted);padding:5px 9px;border-radius:8px;font-size:12px;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.iconbtn:hover{color:var(--ink);border-color:var(--accent);box-shadow:0 0 12px rgba(16,185,129,.15)}
.iconbtn.wa:hover{color:#25d366;border-color:#25d366;box-shadow:0 0 12px rgba(37,211,102,.15)}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:12px 14px;border-bottom:1px solid var(--line);font-weight:600}
td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--panel2)}
select.mini{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:5px 8px;border-radius:8px;font-size:12.5px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.msgcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px;display:flex;flex-direction:column;gap:9px}
.msgcard h3{font-size:14.5px}
.msgcard .body{color:var(--muted);font-size:13px;white-space:pre-wrap;flex:1;max-height:120px;overflow:auto}
.msgcard .row{display:flex;gap:7px;flex-wrap:wrap}
audio{width:100%;height:38px;margin-top:4px}

.overlay{position:fixed;inset:0;background:rgba(4,10,8,.7);display:none;align-items:center;justify-content:center;z-index:80;padding:18px}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow:auto;padding:22px}
.modal h2{font-size:18px;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:10px}
.field textarea{min-height:90px;resize:vertical}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:10px;font-size:12.5px;text-align:left}
.chip:hover{border-color:var(--accent)}
.chip small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.varhint{font-size:11.5px;color:var(--muted);margin-top:5px}

.cfg{background:#2a1c10;border:1px solid #5a3a12;color:#f5c451;padding:11px 16px;border-radius:12px;margin-bottom:16px;font-size:13px}
.empty{text-align:center;color:var(--muted);padding:60px 20px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--accent);color:var(--ink);padding:12px 20px;border-radius:12px;z-index:90;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

/* ============ CONVERSAS (chat) ============ */
.chat-wrap{display:flex;gap:0;height:calc(100vh - 100px);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.chat-list{width:320px;flex:0 0 320px;border-right:1px solid var(--line);display:flex;flex-direction:column;background:#0f1c17}
.chat-list-head{padding:12px 14px;border-bottom:1px solid var(--line)}
.chat-list-head input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:10px;font-size:13px}
.chat-list-items{flex:1;overflow-y:auto}
.chat-item{padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:11px;align-items:center;transition:background .15s}
.chat-item:hover{background:var(--panel2)}
.chat-item.active{background:var(--panel2);border-left:3px solid var(--accent);padding-left:11px}
.chat-item .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a3a30,#0f1f1a);color:var(--accent2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;flex-shrink:0}
.chat-item-body{flex:1;min-width:0}
.chat-item-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.chat-item-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-item-time{font-size:11px;color:var(--muted);flex-shrink:0}
.chat-item-preview{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-item-badge{background:var(--accent);color:#06140e;font-size:11px;border-radius:999px;padding:2px 7px;font-weight:700;margin-left:6px}

.chat-view{flex:1;display:flex;flex-direction:column;min-width:0;background:#0d1815}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:#12211c}
.chat-header .avatar{width:36px;height:36px;font-size:13px;border-radius:50%;background:linear-gradient(135deg,#1a3a30,#0f1f1a);color:var(--accent2);display:flex;align-items:center;justify-content:center;font-weight:600}
.chat-header .info{flex:1;min-width:0}
.chat-header .info .n{font-weight:600;font-size:14px}
.chat-header .info .p{font-size:11.5px;color:var(--muted)}
.chat-body{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:6px;background-image:radial-gradient(circle at 20% 30%,rgba(16,185,129,.03),transparent 40%),radial-gradient(circle at 80% 70%,rgba(163,230,53,.02),transparent 40%);background-color:#0d1815}
.msg{max-width:70%;padding:8px 12px;border-radius:12px;font-size:13.5px;line-height:1.4;position:relative;word-wrap:break-word}
.msg.in{background:var(--wa-in);border-bottom-left-radius:3px;align-self:flex-start;color:var(--ink)}
.msg.out{background:var(--wa-out);border-bottom-right-radius:3px;align-self:flex-end;color:#eaf5f0}
.msg .t{font-size:10.5px;color:rgba(234,245,240,.55);text-align:right;margin-top:3px;font-variant-numeric:tabular-nums}
.msg .caption{margin-top:4px}
.msg audio{width:250px;height:36px;margin:2px 0}
.msg img{max-width:260px;border-radius:8px;display:block}
.chat-input{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:flex-end;background:#12211c;position:relative}
.chat-input textarea{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:20px;padding:9px 14px;resize:none;max-height:120px;min-height:38px;font-size:13.5px;font-family:inherit}
.chat-input button{background:var(--accent);color:#06140e;width:38px;height:38px;border-radius:50%;font-size:16px;font-weight:700;flex-shrink:0}
.chat-input button.aux{background:var(--panel2);color:var(--muted);border:1px solid var(--line);font-size:15px}
.chat-input button.aux:hover{color:var(--accent2);border-color:var(--accent)}
.chat-input button:hover{filter:brightness(1.1)}
.chat-input button.rec{background:var(--danger);color:#fff}
.rec-bar{flex:1;display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--danger);border-radius:20px;padding:8px 14px;font-size:13.5px;color:var(--ink)}
.rec-bar .rec-dot{width:10px;height:10px;border-radius:50%;background:var(--danger);animation:pulseRec 1s infinite}
@keyframes pulseRec{50%{opacity:.3}}
.rec-bar .rec-time{font-variant-numeric:tabular-nums;color:var(--danger);font-weight:600}
.rec-bar button{width:auto!important;height:auto!important;border-radius:8px!important;padding:5px 10px!important;font-size:12px!important;background:transparent!important;color:var(--muted)!important;border:1px solid var(--line)!important}
.rec-bar button:hover{color:var(--ink)!important}

.prontas-pop{position:absolute;bottom:70px;right:16px;width:340px;max-width:calc(100% - 32px);max-height:400px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:20}
.prontas-pop .ph{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.prontas-pop .pl{overflow-y:auto;flex:1;padding:6px}
.pronta-item{padding:9px 11px;border-radius:8px;cursor:pointer;display:flex;gap:9px;align-items:center;transition:background .15s}
.pronta-item:hover{background:var(--panel2)}
.pronta-item .ico{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.pronta-item .txt{flex:1;min-width:0}
.pronta-item .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pronta-item .sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.preview-bar{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:9px;align-items:center;background:#12211c;flex-wrap:wrap}
.preview-bar audio{height:36px;flex:1;min-width:180px}
.preview-bar img{max-width:80px;max-height:80px;border-radius:8px}
.preview-bar .lbl{font-size:13px;color:var(--ink);flex:1;min-width:120px}
.preview-bar textarea{flex:2;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:8px 12px;resize:none;min-height:38px;font-size:13.5px;font-family:inherit;min-width:150px}
.preview-bar .act{display:flex;gap:6px}
.preview-bar .act button{width:auto;height:34px;border-radius:8px;padding:0 14px;font-size:13px}
.preview-bar .act .cancel{background:var(--panel2);color:var(--muted);border:1px solid var(--line)}

/* ============ PAINEL DE TRABALHO (Chat + Dados do contato) ============ */
.workover{position:fixed;inset:0;background:rgba(4,8,7,.75);backdrop-filter:blur(6px);display:none;z-index:70;padding:24px}
.workover.show{display:flex}
.workpanel{
  width:100%;max-width:1400px;height:100%;margin:0 auto;
  background:var(--grad-panel);border:1px solid var(--line2);border-radius:20px;
  box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(163,230,53,.08);
  display:flex;overflow:hidden;position:relative;
}
.workpanel::before{
  content:''; position:absolute; top:0; left:40px; right:40px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(163,230,53,.3), transparent);
}
.wp-close{
  position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:10px;
  background:rgba(15,30,25,.7);border:1px solid var(--line);color:var(--muted);
  font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  z-index:5;transition:all .15s;
}
.wp-close:hover{color:var(--ink);border-color:var(--danger);background:rgba(248,113,113,.1)}
.wp-chat{flex:1.4;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line);background:#0d1815}
.wp-side{flex:1;display:flex;flex-direction:column;min-width:0;overflow-y:auto}
.wp-side-h{padding:20px 22px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
.wp-side-h .avatar{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#1a3a30,#0f1f1a);color:var(--accent2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;flex-shrink:0;box-shadow:0 0 0 1px rgba(163,230,53,.2),inset 0 1px 0 rgba(163,230,53,.1);flex-shrink:0}
.wp-side-h .nm{flex:1;min-width:0}
.wp-side-h .nm .n1{font-weight:700;font-size:17px;line-height:1.2}
.wp-side-h .nm .n2{font-size:12.5px;color:var(--muted);margin-top:2px}
.wp-form{padding:18px 22px;flex:1;display:flex;flex-direction:column;gap:14px}
.wp-form .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.wp-form .field{margin-bottom:0}
.wp-actions{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:9px;flex-wrap:wrap}
/* Tabs superiores do painel de trabalho */
.wp-tabs-top{
  display:flex;padding:12px 16px 0;gap:4px;border-bottom:1px solid var(--line);background:#12211c;
  position:absolute;top:0;left:0;right:0;z-index:3;
}
.wp-tabs-top button{
  padding:9px 16px;background:transparent;color:var(--muted);font-weight:600;font-size:13px;
  border-radius:9px 9px 0 0;border-bottom:2px solid transparent;transition:all .15s;
}
.wp-tabs-top button:hover{color:var(--ink)}
.wp-tabs-top button.active{color:var(--accent2);border-bottom-color:var(--accent);background:rgba(163,230,53,.05)}
.wp-tabs-top .close-x{margin-left:auto;color:var(--muted);width:34px;height:34px;border-radius:9px;font-size:16px;font-weight:600}
.wp-tabs-top .close-x:hover{color:var(--danger);background:rgba(248,113,113,.08)}

.wp-mobile-tabs{display:none;padding:10px 14px;border-bottom:1px solid var(--line);gap:6px;background:#12211c}
.wp-mobile-tabs button{flex:1;padding:9px;border-radius:9px;background:var(--panel2);color:var(--muted);font-weight:600;font-size:13px}
.wp-mobile-tabs button.active{background:var(--panel3);color:var(--accent2)}

/* Sub-tabs no desktop dentro da coluna lateral */
.wp-subtabs{display:flex;gap:4px;padding:12px 14px 0;border-bottom:1px solid var(--line);background:#12211c}
.wp-subtabs button{padding:8px 14px;background:transparent;color:var(--muted);font-weight:600;font-size:13px;border-radius:8px 8px 0 0;border-bottom:2px solid transparent;transition:all .15s}
.wp-subtabs button:hover{color:var(--ink)}
.wp-subtabs button.active{color:var(--accent2);border-bottom-color:var(--accent)}

/* Tarefas — items */
.tarefas-lista{display:flex;flex-direction:column;gap:8px}
.tarefa-item{
  display:flex;align-items:flex-start;gap:11px;
  background:rgba(21,43,36,.4);border:1px solid var(--line);border-radius:11px;
  padding:11px 13px;transition:all .15s;
}
.tarefa-item:hover{border-color:var(--line2)}
.tarefa-item.vencida{border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.03)}
.tarefa-item.concluida{opacity:.55}
.tarefa-item.concluida .ti-titulo{text-decoration:line-through}
.tarefa-item .chk{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--line);background:transparent;
  color:var(--accent2);font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;
}
.tarefa-item .chk:hover{border-color:var(--accent)}
.tarefa-item.concluida .chk{background:var(--accent);border-color:var(--accent);color:#052e21}
.tarefa-item .ti-body{flex:1;min-width:0;cursor:pointer}
.tarefa-item .ti-topo{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.tarefa-item .ti-titulo{font-weight:600;font-size:13.5px}
.tarefa-item .ti-hora{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
.tarefa-item.vencida .ti-hora{color:var(--danger)}
.tarefa-item .ti-contato{font-size:11.5px;color:var(--muted);margin-top:3px}
.tarefa-item .ti-desc{font-size:12px;color:var(--muted);margin-top:4px}
.tarefa-item .ti-del{
  color:var(--dim);width:28px;height:28px;border-radius:7px;font-size:13px;cursor:pointer;
  background:transparent;flex-shrink:0;transition:all .15s;
}
.tarefa-item .ti-del:hover{color:var(--danger);background:rgba(248,113,113,.08)}

/* Anotações */
.anot-add{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.anot-add textarea{
  flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  padding:9px 12px;border-radius:10px;font-family:inherit;font-size:13px;resize:vertical;min-height:60px;
}
.anot-lista{display:flex;flex-direction:column;gap:8px}
.anot-item{
  background:rgba(21,43,36,.4);border:1px solid var(--line);border-radius:11px;padding:11px 13px;
}
.anot-txt{font-size:13px;color:var(--ink);white-space:pre-wrap;word-wrap:break-word}
.anot-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.anot-date{font-size:11px;color:var(--muted)}
.anot-del{color:var(--dim);width:24px;height:24px;border-radius:6px;background:transparent;font-size:12px;cursor:pointer}
.anot-del:hover{color:var(--danger);background:rgba(248,113,113,.08)}

/* ============ GERENCIAR ETAPAS ============ */
.stage-mng{display:flex;flex-direction:column;gap:8px;max-width:600px}
.stage-row{
  background:rgba(21,43,36,.5);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;display:flex;align-items:center;gap:12px;
  transition:border-color .15s;
}
.stage-row:hover{border-color:var(--line2)}
.stage-row.dragging{opacity:.4}
.stage-row .grip{color:var(--dim);cursor:grab;font-size:14px;padding:0 4px;user-select:none}
.stage-row .grip:active{cursor:grabbing}
.stage-row .cor-input{width:32px;height:32px;border-radius:8px;border:2px solid rgba(255,255,255,.1);cursor:pointer;padding:0;background:transparent}
.stage-row input[type="text"]{flex:1;background:transparent;border:1px solid transparent;color:var(--ink);padding:8px 10px;border-radius:8px;font-size:14px;font-weight:500}
.stage-row input[type="text"]:hover{border-color:var(--line)}
.stage-row input[type="text"]:focus{outline:none;border-color:var(--accent);background:var(--panel2)}
.stage-row .cnt{font-size:11.5px;color:var(--muted);background:rgba(15,30,25,.6);padding:2px 8px;border-radius:999px;flex-shrink:0}
.stage-row .del{background:transparent;color:var(--dim);width:32px;height:32px;border-radius:8px;font-size:15px;cursor:pointer}
.stage-row .del:hover{color:var(--danger);background:rgba(248,113,113,.1)}
.stage-add{
  border:1px dashed var(--line);background:transparent;color:var(--muted);
  padding:14px;border-radius:12px;font-size:13.5px;font-weight:600;text-align:center;
  cursor:pointer;transition:all .15s;
}
.stage-add:hover{border-color:var(--accent);color:var(--accent2);background:rgba(16,185,129,.05)}

/* Modal de confirmação de exclusão de etapa */
.confirm-choice{margin:16px 0;display:flex;flex-direction:column;gap:10px}
.confirm-opt{
  background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:12px;text-align:left;
}
.confirm-opt:hover{border-color:var(--accent)}
.confirm-opt.danger:hover{border-color:var(--danger);background:rgba(248,113,113,.05)}
.confirm-opt .ic{width:36px;height:36px;border-radius:10px;background:var(--panel3);color:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.confirm-opt.danger .ic{color:var(--danger);background:rgba(248,113,113,.1)}
.confirm-opt .tx{flex:1}
.confirm-opt .tx .t1{font-weight:600;font-size:13.5px}
.confirm-opt .tx .t2{font-size:12px;color:var(--muted);margin-top:2px}

/* ============ RESPONSIVO ============ */
@media(max-width:900px){
  :root{--sidebar-w:0px}
  .sidebar{transform:translateX(-100%);transition:transform .25s;box-shadow:0 0 30px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:16px 16px 90px}
  .kpi-row{grid-template-columns:1fr 1fr;gap:12px}
  .kpi{padding:14px 16px}
  .kpi .kpi-num{font-size:24px}
  .sum-grid{grid-template-columns:1fr 1fr;gap:12px}
  .bar-row{grid-template-columns:100px 1fr 44px;gap:8px}
  .bar-row .lbl{font-size:12px}
  .bar-scale{padding-left:110px;font-size:10px}
  .page-title{font-size:22px}
  .searchwrap{max-width:100%}

  /* Bottom nav */
  .botnav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,#0e1a16,#12211c);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 4px 10px;z-index:40}
  .botnav .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;color:var(--muted);font-size:10.5px;font-weight:600;border-radius:8px}
  .botnav .b.active{color:var(--accent2)}
  .botnav .b .ni{font-size:19px}
  .topbar-mobile{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:6px 0}
  .topbar-mobile .brand-mini{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px}
  .topbar-mobile .brand-mini .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#10b981,#0d9668);display:flex;align-items:center;justify-content:center;font-weight:700;color:#052e21;font-size:16px}
  .chat-list{width:100%;flex:0 0 auto;max-height:220px}
  .chat-wrap{flex-direction:column;height:calc(100vh - 180px)}
  .chat-wrap.showing-chat .chat-list{display:none}
  .chat-wrap:not(.showing-chat) .chat-view{display:none}

  /* Painel de trabalho no mobile: alterna entre Chat e Dados */
  .workover{padding:0}
  .workpanel{border-radius:0;max-width:100%;flex-direction:column}
  .wp-chat, .wp-side{flex:none;width:100%}
  .wp-mobile-tabs{display:flex}
  .wp-subtabs{display:none}
  .workpanel.mode-dados .wp-chat, .workpanel.mode-tarefas .wp-chat{display:none}
  .workpanel.mode-dados .wp-side, .workpanel.mode-tarefas .wp-side{flex:1;display:flex;flex-direction:column}
  .workpanel.mode-chat .wp-side{display:none}
  .workpanel.mode-chat .wp-chat{flex:1;display:flex}
}
@media(min-width:901px){ .botnav, .topbar-mobile{display:none} }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR desktop -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">P</div>
      <div class="txt"><div class="n1">Prado</div><div class="n2">Chat</div></div>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-item active" data-tab="inicio"><span class="ni">🏠</span> Início</button>
      <button class="nav-item" data-tab="conversas"><span class="ni">💬</span> Chat <span class="badge" id="badgeNaoLidas" style="display:none">0</span></button>
      <button class="nav-item" data-tab="pipeline"><span class="ni">📊</span> Pipeline</button>
      <button class="nav-item" data-tab="contatos"><span class="ni">👥</span> Contatos</button>
      <button class="nav-item" data-tab="tarefas"><span class="ni">📋</span> Tarefas <span class="badge" id="badgeTarefas" style="display:none">0</span></button>
      <button class="nav-item" data-tab="prontas"><span class="ni">⚡</span> Prontas</button>
      <button class="nav-item soon" data-tab="automacoes"><span class="ni">🤖</span> Automações</button>
    </nav>
    <div class="user-box">
      <div class="avatar">DP</div>
      <div class="info"><div class="n">Dant Prado</div><div class="r">Administrador</div></div>
      <span class="chev">▾</span>
    </div>
  </aside>

  <main class="main">
    <!-- Barra topo mobile -->
    <div class="topbar-mobile">
      <div class="brand-mini"><div class="logo">P</div><span>Prado <span style="color:var(--accent)">Chat</span></span></div>
      <button class="icb" onclick="document.getElementById('sidebar').classList.toggle('open')" style="width:38px;height:38px;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink)">☰</button>
    </div>
    <div id="pageContent"></div>
  </main>
</div>

<!-- Bottom nav mobile -->
<nav class="botnav" id="botnav">
  <button class="b active" data-tab="inicio"><span class="ni">🏠</span>Início</button>
  <button class="b" data-tab="conversas"><span class="ni">💬</span>Chat</button>
  <button class="b" data-tab="pipeline"><span class="ni">📊</span>Pipeline</button>
  <button class="b" data-tab="tarefas"><span class="ni">📋</span>Tarefas</button>
  <button class="b" data-tab="prontas"><span class="ni">⚡</span>Prontas</button>

async function _ler(tabela, opts){
  if(!sb) return [];
  var q = sb.from(tabela).select('*');
  if(opts && opts.order) q = q.order(opts.order.col, {ascending: opts.order.asc !== false});
  if(opts && opts.eq){ for(var k in opts.eq) q = q.eq(k, opts.eq[k]); }
  if(opts && opts.limit) q = q.limit(opts.limit);
  var r = await q;
  if(r.error){ console.error(r.error); return []; }
  return r.data || [];
}
async function _salvar(tabela, obj){
  if(!sb) return null;
  var r = await sb.from(tabela).upsert(obj).select();
  if(r.error){ console.error(r.error); toast('Erro ao salvar'); return null; }
  return r.data ? r.data[0] : null;
}
async function _deletar(tabela, id){
  if(!sb) return;
  var r = await sb.from(tabela).delete().eq('id', id);
  if(r.error){ console.error(r.error); toast('Erro ao excluir'); }
}
async function _update(tabela, id, obj){
  if(!sb) return;
  await sb.from(tabela).update(obj).eq('id', id);
}

function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function soDigitos(t){ return (t||'').replace(/\D/g,''); }
function telWhats(t){
  var d = soDigitos(t);
  if(d.length && d[0] !== '5') d = '55' + d;
  return d;
}
function aplicarVars(texto, c){
  var t = texto || '';
  var primeiro = (c && c.nome) ? c.nome.split(' ')[0] : '';
  t = t.split('{nome}').join(c && c.nome ? c.nome : '');
  t = t.split('{primeiro}').join(primeiro);
  t = t.split('{cidade}').join(c && c.cidade ? c.cidade : '');
  t = t.split('{negocio}').join(c && c.negocio ? c.negocio : '');
  return t;
}
function etapaDe(id){ for(var i=0;i<state.etapas.length;i++){ if(state.etapas[i].id===id) return state.etapas[i]; } return null; }
function contatoDe(id){ for(var i=0;i<state.contatos.length;i++){ if(state.contatos[i].id===id) return state.contatos[i]; } return null; }
function iniciaisDe(nome){
  var n = (nome||'?').trim().split(/\s+/);
  if(n.length===1) return n[0][0].toUpperCase();
  return (n[0][0]+n[n.length-1][0]).toUpperCase();
}
function formatHora(ts){
  if(!ts) return '';
  var d = new Date(ts);
  var hoje = new Date();
  if(d.toDateString() === hoje.toDateString()){
    return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  var ontem = new Date(hoje); ontem.setDate(ontem.getDate()-1);
  if(d.toDateString() === ontem.toDateString()) return 'ontem';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}
function fmtMoney(v){
  return 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
}

var toastTimer=null;
function toast(msg){

function ligarRealtime(){
  if(!sb) return;
  sb.channel('crm-conversas-rt')
    .on('postgres_changes', {event:'*', schema:'public', table:'crm_conversas'}, function(payload){
      var nova = payload.new;
      if(!nova){ return; }
      var idx = -1;
      for(var i=0;i<state.conversas.length;i++){ if(state.conversas[i].id===nova.id){ idx=i; break; } }
      if(idx>=0) state.conversas[idx] = nova; else state.conversas.unshift(nova);
      state.conversas.sort(function(a,b){ return new Date(b.ultima_hora||0) - new Date(a.ultima_hora||0); });
      if(state.tab==='conversas') renderListaConversas();
      atualizarBadgeNaoLidas();
    })
    .subscribe();

  sb.channel('crm-mensagens-rt')
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'crm_mensagens'}, function(payload){
      var m = payload.new;
      if(!m) return;
      if(!state.mensagens[m.conversa_id]) state.mensagens[m.conversa_id] = [];
      var arr = state.mensagens[m.conversa_id];
      for(var i=0;i<arr.length;i++){
        if(arr[i].id===m.id) return;
        if(arr[i].message_id && m.message_id && arr[i].message_id===m.message_id) return;
      }
      if(m.de_mim){
        var ts = new Date(m.timestamp_msg||m.criado_em).getTime();
        for(var j=0;j<arr.length;j++){
          var l = arr[j];
          if(!l.de_mim) continue;
          if(l.tipo !== m.tipo) continue;
          var lts = new Date(l.timestamp_msg||l.criado_em).getTime();
          if(Math.abs(ts - lts) < 20000){
            if(String(l.message_id||'').indexOf('local-')===0){
              arr[j] = m;
              if(state.tab==='conversas' && state.conversaAtiva && state.conversaAtiva.id===m.conversa_id){
                renderMensagens();
              }
            }
            return;
          }
        }
      }
      arr.push(m);
      if(state.tab==='conversas' && state.conversaAtiva && state.conversaAtiva.id===m.conversa_id){
        renderMensagens(); scrollChatFim();
      }
    })
    .subscribe();
}

function calcularMetricas(){
  // Total de clientes
  var totalClientes = state.contatos.length;

  // Etapas de ganho e perdido (por nome)
  var etapaEhGanho = {}, etapaEhPerdido = {}, etapaAtiva = {};
  for(var i=0;i<state.etapas.length;i++){
    var e = state.etapas[i];
    var ganho = ETAPAS_GANHO.indexOf(e.nome) >= 0;
    var perd = ETAPAS_PERDIDO.indexOf(e.nome) >= 0;
    etapaEhGanho[e.id] = ganho;
    etapaEhPerdido[e.id] = perd;
    etapaAtiva[e.id] = !ganho && !perd;
  }

  // Conversões (mês) — contatos em etapa de ganho com ultimo_contato ou criado_em no mês
  var agora = new Date();
  var iniMes = new Date(agora.getFullYear(), agora.getMonth(), 1);
  var conversoesMes = 0;
  var totalGanhos = 0;
  var leadsAtivos = 0;
  var valorNegociacao = 0;
  var valorPotencial = 0;
  for(var j=0;j<state.contatos.length;j++){
    var c = state.contatos[j];
    if(etapaEhGanho[c.etapa_id]){
      totalGanhos++;
      var dtRef = c.ultimo_contato || c.criado_em;
      if(dtRef && new Date(dtRef) >= iniMes) conversoesMes++;
    } else if(etapaAtiva[c.etapa_id]){
      leadsAtivos++;
      valorNegociacao += Number(c.valor||0);
      valorPotencial += Number(c.valor||0);
    }
  }

  // Taxa de conversão
  var totalFinalizados = totalGanhos + state.contatos.filter(function(c){ return etapaEhPerdido[c.etapa_id]; }).length;
  var taxaConversao = totalFinalizados > 0 ? (totalGanhos / totalFinalizados) * 100 : null;

  // Tarefas pendentes (abertas, não concluídas)
  var tarefasPendentes = state.tarefas.filter(function(t){ return !t.concluida; }).length;

  return {
    totalClientes: totalClientes,
    conversoesMes: conversoesMes,
    potencialReceita: valorPotencial,
    tarefasPendentes: tarefasPendentes,
    leadsAtivos: leadsAtivos,
    valorNegociacao: valorNegociacao,
    taxaConversao: taxaConversao,
    cicloMedioDias: null
  };
}

function kpiCard(icone, titulo, valor, delta){

  h += '<div class="top"><div class="ic">'+icone+'</div><span>'+esc(titulo)+'</span></div>';
  h += '<div class="kpi-num">'+valor+'</div>';
  h += '<div class="delta">';
  if(delta) h += delta;
  else h += '<span class="muted">— vs. mês anterior</span>';
  h += '</div></div>';
  return h;
}

function sumCell(ic, val, lbl){
  return '<div class="sum-cell"><div class="ic">'+ic+'</div><div class="txt"><div class="v">'+esc(String(val))+'</div><div class="l">'+esc(lbl)+'</div></div></div>';
}
function renderGraficoBarras(){
  // Conta contatos por etapa
  var contagem = {};
  for(var i=0;i<state.etapas.length;i++){ contagem[state.etapas[i].id] = 0; }
  for(var j=0;j<state.contatos.length;j++){
    var eid = state.contatos[j].etapa_id;
    if(contagem[eid] !== undefined) contagem[eid]++;
  }
  var max = 0;
  for(var k=0;k<state.etapas.length;k++){ if(contagem[state.etapas[k].id] > max) max = contagem[state.etapas[k].id]; }
  if(max===0) max = 1;
  var h = '<div class="bar-list">';
  for(var i=0;i<state.etapas.length;i++){
    var e = state.etapas[i];
    var v = contagem[e.id] || 0;
    var pct = Math.max(2, Math.round((v/max)*100));
    h += '<div class="bar-row">';
    h += '<div class="lbl">'+esc(e.nome)+'</div>';
    h += '<div class="btrack"><div class="bfill" style="width:'+pct+'%"></div></div>';
    h += '<div class="val">'+v+'</div>';
    h += '</div>';
  }
  h += '</div>';
  // Escala
  var passos = 4;
  h += '<div class="bar-scale">';
  for(var s=0;s<=passos;s++){
    h += '<span>'+Math.round(max*s/passos)+'</span>';
  }
  h += '</div>';
  return h;
}

function ligarDnD(){
  var cards = document.querySelectorAll('.card');
  var bodies = document.querySelectorAll('.col-body');
  var arrastando = null;
  cards.forEach(function(card){
    card.addEventListener('dragstart', function(){ arrastando=card; card.classList.add('dragging'); });
    card.addEventListener('dragend', function(){ card.classList.remove('dragging'); arrastando=null; });
    card.addEventListener('click', function(){ abrirContato(Number(card.dataset.id)); });
  });
  bodies.forEach(function(body){
    body.addEventListener('dragover', function(ev){ ev.preventDefault(); body.classList.add('drag-over'); });
    body.addEventListener('dragleave', function(){ body.classList.remove('drag-over'); });
    body.addEventListener('drop', async function(ev){
      ev.preventDefault(); body.classList.remove('drag-over');
      if(!arrastando) return;
      var id = Number(arrastando.dataset.id);
      var novaEtapa = Number(body.dataset.etapa);
      var c = contatoDe(id);
      if(c && c.etapa_id !== novaEtapa){
        c.etapa_id = novaEtapa;
        c.ultimo_contato = new Date().toISOString();
        await _salvar('crm_contatos', c);
        render();
      }
    });
  });
}

// Envio de mídia via Evolution
// ============================================================
function blobParaBase64(blob){
  return new Promise(function(resolve, reject){
    var r = new FileReader();
    r.onload = function(){ resolve(String(r.result).split(',')[1]); };
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}
async function enviarMidiaEvolution(tipoEvo, blob, nomeArq, caption){
  var conv = state.conversaAtiva;
  if(!conv) throw new Error('Sem conversa ativa');
  var b64 = await blobParaBase64(blob);
  var url, body;
  if(tipoEvo === 'audio'){
    url = EVOLUTION_URL + '/message/sendWhatsAppAudio/' + conv.instancia;
    body = { number: conv.numero_cliente, audio: b64 };
  } else {
    url = EVOLUTION_URL + '/message/sendMedia/' + conv.instancia;
    body = {
      number: conv.numero_cliente,
      mediatype: tipoEvo,
      mimetype: blob.type || (tipoEvo==='image' ? 'image/jpeg' : 'application/octet-stream'),
      caption: caption || '',
      media: b64,
      fileName: nomeArq || (tipoEvo + '_' + Date.now())
    };
  }
  var r = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':EVOLUTION_API_KEY},
    body: JSON.stringify(body)
  });
  if(!r.ok){ throw new Error('HTTP '+r.status); }
  return r.json();
}
async function salvarMidiaNoStorage(blob, extensao){
  var nomeArq = 'out-' + Date.now() + '.' + extensao;
  var up = await sb.storage.from('crm-midia').upload(nomeArq, blob, {contentType: blob.type});
  if(up.error){ console.error(up.error); return null; }
  return sb.storage.from('crm-midia').getPublicUrl(nomeArq).data.publicUrl;
}
async function persistirMensagemEnviada(tipo, midiaUrl, mime, texto, messageId){
  var conv = state.conversaAtiva;
  var agora = new Date().toISOString();
  var msg = {
    id: novoId(), conversa_id: conv.id, instancia: conv.instancia,
    message_id: messageId || ('local-'+Date.now()), de_mim: true, tipo: tipo,
    texto: texto || '', midia_url: midiaUrl, midia_mime: mime,
    timestamp_msg: agora
  };
  await _salvar('crm_mensagens', msg);
  var preview = tipo === 'text' ? (texto||'').slice(0,80) : ('[' + tipo + ']');
  await _update('crm_conversas', conv.id, { ultima_mensagem: preview, ultima_hora: agora });
  if(!state.mensagens[conv.id]) state.mensagens[conv.id]=[];
  state.mensagens[conv.id].push(msg);
  conv.ultima_mensagem = preview;
  conv.ultima_hora = agora;
  renderMensagens(); scrollChatFim();
}
async function onArquivoAnexo(ev){
  var f = ev.target.files[0]; ev.target.value='';
  if(!f || !state.conversaAtiva) return;
  var eImagem = f.type.indexOf('image/') === 0;
  var eVideo = f.type.indexOf('video/') === 0;
  var tipoEvo = eImagem ? 'image' : (eVideo ? 'video' : 'document');
  var tipoBanco = eImagem ? 'image' : (eVideo ? 'video' : 'document');
  var caption = '';
  if(eImagem){ caption = prompt('Legenda (opcional):','') || ''; }
  toast('Enviando...');
  try {
    var resp = await enviarMidiaEvolution(tipoEvo, f, f.name, caption);
    var messageId = (resp && resp.key && resp.key.id) ? resp.key.id : null;
    var ext = f.name.split('.').pop() || (eImagem?'jpg':'bin');
    var url = await salvarMidiaNoStorage(f, ext);
    await persistirMensagemEnviada(tipoBanco, url, f.type, caption || (eImagem?'':f.name), messageId);
    toast('Enviado ✓');
  } catch(e){ console.error(e); toast('Erro ao enviar: '+e.message); }
}

// Gravação
var gravador = { rec:null, chunks:[], stream:null, iniciouEm:0, timer:null, ativo:false };
async function toggleGravacao(){
  if(gravador.ativo){ pararGravacaoEEnviar(); return; }
  if(!state.conversaAtiva) return;
  try {
    var stream = await navigator.mediaDevices.getUserMedia({audio:true});
    gravador.stream = stream; gravador.chunks = [];
    var mimes = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4'];
    var mimeEscolhido = '';
    for(var i=0;i<mimes.length;i++){ if(MediaRecorder.isTypeSupported(mimes[i])){ mimeEscolhido = mimes[i]; break; } }
    var rec = mimeEscolhido ? new MediaRecorder(stream, {mimeType: mimeEscolhido}) : new MediaRecorder(stream);
    rec.ondataavailable = function(e){ if(e.data && e.data.size>0) gravador.chunks.push(e.data); };
    rec.onstop = function(){ stream.getTracks().forEach(function(t){ t.stop(); }); };
    rec.start();
    gravador.rec = rec; gravador.iniciouEm = Date.now(); gravador.ativo = true;
    montarBarraGravando();
    gravador.timer = setInterval(atualizarTempoGrav, 250);
  } catch(e){ console.error(e); toast('Precisa permitir o microfone'); }
}
function montarBarraGravando(){
  var bar = document.getElementById('chatInputBar');
  if(!bar) return;
  bar.innerHTML =
    '<div class="rec-bar">' +
      '<span class="rec-dot"></span><span>Gravando</span>' +
      '<span class="rec-time" id="recTime">0:00</span>' +
      '<div style="flex:1"></div>' +
      '<button onclick="cancelarGravacao()">Cancelar</button>' +
    '</div>' +
    '<button id="btnEnviarAudio" title="Enviar áudio">➤</button>';
  document.getElementById('btnEnviarAudio').onclick = pararGravacaoEEnviar;
}
function atualizarTempoGrav(){
  var el = document.getElementById('recTime'); if(!el) return;
  var s = Math.floor((Date.now() - gravador.iniciouEm)/1000);
  var mm = Math.floor(s/60), ss = s%60;
  el.textContent = mm + ':' + (ss<10?'0':'') + ss;
}
function restaurarBarraInput(){
  clearInterval(gravador.timer); gravador.timer=null;
  gravador.ativo = false;
  var bar = document.getElementById('chatInputBar');
  if(!bar) return;
  bar.innerHTML =
    '<button class="aux" id="btnAnexar" title="Anexar imagem/arquivo">📎</button>' +
    '<button class="aux" id="btnProntas" title="Mensagens prontas">⚡</button>' +
    '<textarea id="msgInput" placeholder="Digite uma mensagem..." rows="1"></textarea>' +
    '<button class="aux" id="btnGravar" title="Gravar áudio">🎤</button>' +
    '<button id="btnEnviar" title="Enviar">➤</button>' +
    '<input type="file" id="fileAnexo" accept="image/*,application/pdf,video/*" style="display:none">';
  ligarChatEvents();
}
function cancelarGravacao(){
  if(!gravador.rec) return;
  try { gravador.rec.stop(); } catch(e){}
  restaurarBarraInput(); toast('Gravação cancelada');
}
async function pararGravacaoEEnviar(){
  if(!gravador.rec || !gravador.ativo) return;
  var rec = gravador.rec; var chunks = gravador.chunks;
  var mime = rec.mimeType || 'audio/webm';
  var stopped = new Promise(function(res){ rec.addEventListener('stop', function(){ res(); }, {once:true}); });
  rec.stop(); await stopped;
  var blob = new Blob(chunks, {type: mime});
  restaurarBarraInput();
  if(blob.size < 500){ toast('Áudio muito curto'); return; }
  toast('Enviando áudio...');
  try {
    var resp = await enviarMidiaEvolution('audio', blob, null, '');
    var messageId = (resp && resp.key && resp.key.id) ? resp.key.id : null;
    var url = await salvarMidiaNoStorage(blob, mime.indexOf('ogg')>-1?'ogg':(mime.indexOf('mp4')>-1?'m4a':'webm'));
    await persistirMensagemEnviada('audio', url, mime, '', messageId);
    toast('Áudio enviado ✓');
  } catch(e){ console.error(e); toast('Erro ao enviar áudio: '+e.message); }
}

function cancelarPreview(){ state.pendentePreview = null; restaurarBarraInput(); }
async function confirmarPreview(){

async function enviarMensagem(){
  var input = document.getElementById('msgInput'); if(!input) return;
  var texto = input.value.trim();
  if(!texto || !state.conversaAtiva) return;
  var btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  var conv = state.conversaAtiva;
  var agora = new Date().toISOString();
  try {
    var r = await fetch(EVOLUTION_URL+'/message/sendText/'+conv.instancia, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':EVOLUTION_API_KEY},
      body: JSON.stringify({number: conv.numero_cliente, text: texto})
    });
    if(!r.ok){ throw new Error('HTTP '+r.status); }
    var resp = await r.json();
    var messageId = (resp && resp.key && resp.key.id) ? resp.key.id : ('local-'+Date.now());
    var msg = {
      id: novoId(), conversa_id: conv.id, instancia: conv.instancia,
      message_id: messageId, de_mim: true, tipo:'text',
      texto: texto, midia_url:null, midia_mime:null,
      timestamp_msg: agora
    };
    await _salvar('crm_mensagens', msg);
    var preview = texto.slice(0,80);
    await _update('crm_conversas', conv.id, { ultima_mensagem: preview, ultima_hora: agora });
    if(!state.mensagens[conv.id]) state.mensagens[conv.id]=[];
    var jaTem = false, arr = state.mensagens[conv.id];
    for(var i=0;i<arr.length;i++){ if(arr[i].message_id===messageId){ jaTem = true; break; } }
    if(!jaTem) arr.push(msg);
    conv.ultima_mensagem = preview; conv.ultima_hora = agora;
    input.value=''; input.style.height='auto';
    renderMensagens(); scrollChatFim();
  } catch(e){ console.error(e); toast('Erro ao enviar: '+e.message); }
  finally { btn.disabled = false; }
}

async function abrirConversaContato(cid){
  var c = contatoDe(cid);
  if(!c || !c.telefone){ toast('Contato sem telefone'); return; }
  var num = telWhats(c.telefone);
  var conv = null;
  for(var i=0;i<state.conversas.length;i++){
    if(state.conversas[i].instancia===INSTANCIA_PADRAO && state.conversas[i].numero_cliente===num){
      conv=state.conversas[i]; break;
    }
  }
  if(!conv && sb){
    var r = await sb.from('crm_conversas').select('*')
      .eq('instancia', INSTANCIA_PADRAO).eq('numero_cliente', num).maybeSingle();
    if(r.data){ conv = r.data; state.conversas.unshift(conv); }
  }
  if(!conv){
    conv = {
      id: novoId(), instancia: INSTANCIA_PADRAO, numero_cliente: num,
      nome_cliente: c.nome, contato_id: c.id, ultima_mensagem:'', ultima_hora: new Date().toISOString(), nao_lidas:0

async function salvarPronta(id){
  var nome = val('p_nome').trim();
  if(!nome){ toast('Informe o nome'); return; }
  var existente = id ? achar(state.prontas, id) : null;
  var tipo = val('p_tipo');
  var negocio = val('p_neg');
  var texto = val('p_texto').trim();
  var arq = document.getElementById('p_arquivo');
  var midia_url = existente ? existente.midia_url : null;
  var midia_mime = existente ? existente.midia_mime : null;
  if(tipo!=='text' && arq && arq.files[0]){
    var f = arq.files[0];
    var ext = f.name.split('.').pop() || (tipo==='audio'?'ogg':'jpg');
    var nomeArq = 'pronta-'+Date.now()+'.'+ext;
    toast('Enviando arquivo...');
    var up = await sb.storage.from('crm-midia').upload(nomeArq, f, {contentType: f.type});
    if(up.error){ console.error(up.error); toast('Falha no upload'); return; }
    midia_url = sb.storage.from('crm-midia').getPublicUrl(nomeArq).data.publicUrl;
    midia_mime = f.type;
  }
  if(tipo!=='text' && !midia_url){ toast('Selecione o arquivo'); return; }
  if(tipo==='text' && !texto){ toast('Escreva o texto'); return; }
  var p = {
    id: id || novoId(), nome: nome, negocio: negocio, tipo: tipo,
    texto: texto, midia_url: midia_url, midia_mime: midia_mime,
    ordem: existente ? existente.ordem : (state.prontas.length),
    criado_em: existente ? existente.criado_em : new Date().toISOString()
  };
  await _salvar('crm_prontas', p);
  if(id){ for(var i=0;i<state.prontas.length;i++){ if(state.prontas[i].id===id) state.prontas[i]=p; } }

function agruparTarefas(){
  var agora = new Date();
  var hojeIni = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
  var amanhaIni = new Date(hojeIni); amanhaIni.setDate(amanhaIni.getDate()+1);
  var depoisAmanha = new Date(hojeIni); depoisAmanha.setDate(depoisAmanha.getDate()+2);
  var semanaFim = new Date(hojeIni); semanaFim.setDate(semanaFim.getDate()+7);

  var vencidas = [], hoje = [], amanha = [], estaSemana = [], futuras = [], concluidas = [];
  var pend = state.tarefas.filter(function(t){ return !t.concluida; });
  pend.sort(function(a,b){ return new Date(a.vence_em) - new Date(b.vence_em); });
  for(var i=0;i<pend.length;i++){
    var t = pend[i];
    var v = new Date(t.vence_em);
    if(v < agora) vencidas.push(t);
    else if(v < amanhaIni) hoje.push(t);
    else if(v < depoisAmanha) amanha.push(t);
    else if(v < semanaFim) estaSemana.push(t);
    else futuras.push(t);
  }
  concluidas = state.tarefas.filter(function(t){ return t.concluida; })
    .sort(function(a,b){ return new Date(b.concluida_em||b.vence_em) - new Date(a.concluida_em||a.vence_em); })
    .slice(0, 20);
  return { vencidas:vencidas, hoje:hoje, amanha:amanha, estaSemana:estaSemana, futuras:futuras, concluidas:concluidas };
}

function proximaHoraCheia(){
  var d = new Date();
  d.setMinutes(0,0,0);
  d.setHours(d.getHours()+1);
  return d.toISOString();
}
function dtLocalStr(iso){
  if(!iso) return '';
  var d = new Date(iso);
  var pad = function(n){ return n<10?'0'+n:n; };
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}
async function salvarTarefa(id){

    concluida_em: existente ? existente.concluida_em : null,

  };
  await _salvar('crm_tarefas', t);
  if(id){ for(var i=0;i<state.tarefas.length;i++){ if(state.tarefas[i].id===id) state.tarefas[i]=t; } }
  else state.tarefas.push(t);

async function checarTarefasVencendo(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  var agora = new Date();
  var tarefasVencendo = state.tarefas.filter(function(t){
    if(t.concluida || t.notificada) return false;
    return new Date(t.vence_em) <= agora;
  });
  for(var i=0;i<tarefasVencendo.length;i++){
    var t = tarefasVencendo[i];
    var contato = t.contato_id ? contatoNome(t.contato_id) : 'sem contato';
    try {
      var n = new Notification('📋 Tarefa: ' + t.titulo, {
        body: (t.contato_id ? ('com ' + contato) : '') + (t.descricao ? ' — ' + t.descricao : ''),
        tag: 'tarefa-' + t.id,
        requireInteraction: true
      });
      n.onclick = function(tarId){ return function(){
        window.focus();
        trocarTab('tarefas');
        n.close();
      }; }(t.id);
    } catch(e){ console.error('Erro na notificação:', e); }
    t.notificada = true;
    await _update('crm_tarefas', t.id, {notificada:true});
  }
}

function abrirContato(id){
  var c = contatoDe(id); if(!c) return;
  var num = telWhats(c.telefone||'');
  if(!num){
    editarContato(id);
    return;
  }
  state.wpTab = 'chat';
  procurarOuCriarConversa(c, num).then(function(conv){
    state.conversaAtiva = conv;
    if(!state.mensagens[conv.id]){
      _ler('crm_mensagens', {eq:{conversa_id:conv.id}, order:{col:'timestamp_msg', asc:true}}).then(function(msgs){
        state.mensagens[conv.id] = msgs;
        renderWorkpanel(c, conv);
      });
    } else {
      renderWorkpanel(c, conv);
    }
    // Carrega anotações em background
    carregarAnotacoes(c.id);
  });
}
async function procurarOuCriarConversa(c, num){
  for(var i=0;i<state.conversas.length;i++){
    if(state.conversas[i].instancia===INSTANCIA_PADRAO && state.conversas[i].numero_cliente===num){
      return state.conversas[i];
    }
  }
  if(sb){
    var r = await sb.from('crm_conversas').select('*')
      .eq('instancia', INSTANCIA_PADRAO).eq('numero_cliente', num).maybeSingle();
    if(r.data){ state.conversas.unshift(r.data); return r.data; }
  }
  var conv = {
    id: novoId(), instancia: INSTANCIA_PADRAO, numero_cliente: num,
    nome_cliente: c.nome, contato_id: c.id, ultima_mensagem:'', ultima_hora: new Date().toISOString(), nao_lidas:0
  };
  await _salvar('crm_conversas', conv);
  state.conversas.unshift(conv);
  return conv;
}

function renderWorkpanel(c, conv){
  var wp = document.getElementById('workpanel');
  var h = '';

  // Tabs mobile (só aparecem em telas pequenas)
  h += '<div class="wp-mobile-tabs">';
  h += '<button data-m="chat" class="'+(state.wpTab==='chat'?'active':'')+'" onclick="wpMobileTab(\'chat\')">💬 Chat</button>';
  h += '<button data-m="dados" class="'+(state.wpTab==='dados'?'active':'')+'" onclick="wpMobileTab(\'dados\')">📋 Dados</button>';
  h += '<button data-m="tarefas" class="'+(state.wpTab==='tarefas'?'active':'')+'" onclick="wpMobileTab(\'tarefas\')">📝 Tarefas</button>';
  h += '<button class="close-x" onclick="fecharWorkpanel()">✕</button>';
  h += '</div>';

  // Coluna esquerda: Chat (sempre visível no desktop)
  h += '<div class="wp-chat">';
  h += '<div class="chat-header">';
  h += '<div class="avatar">'+esc(iniciaisDe(c.nome))+'</div>';
  h += '<div class="info"><div class="n">'+esc(c.nome)+'</div><div class="p">+'+esc(conv.numero_cliente)+' · '+esc(conv.instancia)+'</div></div>';
  h += '</div>';
  h += '<div class="chat-body" id="chatBody"></div>';
  h += '<div class="chat-input" id="chatInputBar" style="position:relative">';
  h += '<button class="aux" id="btnAnexar" title="Anexar imagem/arquivo">📎</button>';
  h += '<button class="aux" id="btnProntas" title="Mensagens prontas">⚡</button>';
  h += '<textarea id="msgInput" placeholder="Digite uma mensagem..." rows="1"></textarea>';
  h += '<button class="aux" id="btnGravar" title="Gravar áudio">🎤</button>';
  h += '<button id="btnEnviar" title="Enviar">➤</button>';
  h += '<input type="file" id="fileAnexo" accept="image/*,application/pdf,video/*" style="display:none">';
  h += '</div>';
  h += '</div>';

  // Coluna direita: com sub-tabs pra Dados / Tarefas
  h += '<div class="wp-side" id="wpSide">';
  // Sub-tabs desktop (só troca lateral)
  h += '<div class="wp-subtabs">';
  h += '<button data-s="dados" class="'+(state.wpTab!=='tarefas'?'active':'')+'" onclick="wpSubTab(\'dados\')">📋 Dados</button>';
  h += '<button data-s="tarefas" class="'+(state.wpTab==='tarefas'?'active':'')+'" onclick="wpSubTab(\'tarefas\')">📝 Tarefas</button>';
  h += '<div style="flex:1"></div>';
  h += '<button class="close-x" onclick="fecharWorkpanel()" style="color:var(--muted);width:32px;height:32px;border-radius:9px;font-size:14px;margin-bottom:4px">✕</button>';
  h += '</div>';
  h += '<div id="wpSideBody">';
  h += (state.wpTab==='tarefas' ? renderWpTarefas(c) : renderWpDados(c));
  h += '</div>';
  h += '</div>';

  wp.innerHTML = h;
  wp.classList.remove('mode-chat','mode-dados','mode-tarefas');
  wp.classList.add('mode-'+state.wpTab);
  document.getElementById('workover').classList.add('show');
  setTimeout(function(){
    renderMensagens(); scrollChatFim();
    ligarChatEvents();
  }, 30);
}

function wpSubTab(s){
  state.wpTab = (s==='tarefas' ? 'tarefas' : 'dados');
  var conv = state.conversaAtiva;
  var c = null;
  if(conv){
    for(var i=0;i<state.contatos.length;i++){
      if(telWhats(state.contatos[i].telefone||'') === conv.numero_cliente){ c = state.contatos[i]; break; }
    }
  }
  if(!c) return;
  document.querySelectorAll('.wp-subtabs button[data-s]').forEach(function(b){
    b.classList.toggle('active', b.dataset.s===s);
  });
  var body = document.getElementById('wpSideBody');
  if(!body) return;
  if(s==='tarefas'){
    carregarAnotacoes(c.id).then(function(){ body.innerHTML = renderWpTarefas(c); });
  } else {
    body.innerHTML = renderWpDados(c);
  }
}

  var h = '<div class="wp-side-h">';
  h += '<div class="avatar">'+esc(iniciaisDe(c.nome))+'</div>';
  h += '<div class="nm"><div class="n1">'+esc(c.nome)+'</div><div class="n2">Cliente · desde '+formatHora(c.criado_em)+'</div></div>';
  h += '</div>';
  h += '<div class="wp-form" id="wpDadosForm">';
  h += '<div class="field"><label>Nome</label><input id="wp_nome" value="'+esc(c.nome)+'"></div>';
  h += '<div class="field"><label>Telefone</label><input id="wp_tel" value="'+esc(c.telefone||'')+'"></div>';
  h += '<div class="row2">';
  h += '<div class="field"><label>Cidade</label><input id="wp_cidade" value="'+esc(c.cidade||'')+'"></div>';
  h += '<div class="field"><label>Valor (R$)</label><input id="wp_valor" type="number" value="'+(c.valor||0)+'"></div>';
  h += '</div>';
  h += '<div class="row2">';
  h += '<div class="field"><label>Negócio</label><select id="wp_neg"><option value="">—</option>';
  for(var i=0;i<NEGOCIOS.length;i++){ h += '<option'+(NEGOCIOS[i]===c.negocio?' selected':'')+'>'+esc(NEGOCIOS[i])+'</option>'; }
  h += '</select></div>';
  h += '<div class="field"><label>Origem</label><select id="wp_ori"><option value="">—</option>';
  for(var i=0;i<ORIGENS.length;i++){ h += '<option'+(ORIGENS[i]===c.origem?' selected':'')+'>'+esc(ORIGENS[i])+'</option>'; }
  h += '</select></div>';
  h += '</div>';
  h += '<div class="field"><label>Etapa</label><select id="wp_etapa">';
  for(var i=0;i<state.etapas.length;i++){
    var e = state.etapas[i];
    h += '<option value="'+e.id+'"'+(e.id===c.etapa_id?' selected':'')+'>'+esc(e.nome)+'</option>';
  }
  h += '</select></div>';
  h += '<div class="field"><label>Observações</label><textarea id="wp_obs">'+esc(c.observacoes||'')+'</textarea></div>';
  h += '</div>';
  h += '<div class="wp-actions">';
  h += '<button class="btn danger" onclick="excluirContatoWP('+c.id+')">Excluir</button>';
  h += '<div style="flex:1"></div>';
  h += '<button class="btn ghost" onclick="fecharWorkpanel()">Fechar</button>';
  h += '<button class="btn" onclick="salvarContatoWP('+c.id+')">Salvar</button>';
  h += '</div>';
  return h;
}

function renderWpTarefas(c){
  var tarefasContato = state.tarefas.filter(function(t){ return t.contato_id===c.id; })
    .sort(function(a,b){
      if(a.concluida !== b.concluida) return a.concluida ? 1 : -1;
      return new Date(a.vence_em) - new Date(b.vence_em);
    });

  var h = '<div class="wp-side-h">';
  h += '<div class="avatar">'+esc(iniciaisDe(c.nome))+'</div>';
  h += '<div class="nm"><div class="n1">'+esc(c.nome)+'</div><div class="n2">Tarefas</div></div>';
  h += '</div>';
  h += '<div class="wp-form">';

  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
  h += '<h3 style="font-size:14px;flex:1">📋 Tarefas ('+tarefasContato.length+')</h3>';
  h += '<button class="btn sm" onclick="editarTarefa(0, '+c.id+')">+ Nova</button>';
  h += '</div>';
  if(tarefasContato.length===0){
    h += '<div class="empty" style="padding:30px 10px;font-size:12.5px">Nenhuma tarefa ainda.<br><small>Use as observações do cliente pra anotações livres.</small></div>';
  } else {
    h += '<div class="tarefas-lista">';
    for(var i=0;i<tarefasContato.length;i++){ h += tarefaItem(tarefasContato[i]); }
    h += '</div>';
  }

  h += '</div>';
  h += '<div class="wp-actions">';
  h += '<button class="btn ghost" onclick="fecharWorkpanel()">Fechar</button>';
  h += '</div>';
  return h;
}

function renderAbaTarefasNoWP(){
  var c = null;
  var conv = state.conversaAtiva;
  if(conv){
    for(var i=0;i<state.contatos.length;i++){
      if(telWhats(state.contatos[i].telefone||'') === conv.numero_cliente){ c = state.contatos[i]; break; }
    }
  }
  if(!c) return;
  var body = document.getElementById('wpSideBody');
  if(body) body.innerHTML = renderWpTarefas(c);
}


function fecharWorkpanel(){
  document.getElementById('workover').classList.remove('show');
  state.conversaAtiva = null;
}

function wpMobileTab(m){
  state.wpTab = m;
  var wp = document.getElementById('workpanel');
  wp.classList.remove('mode-chat','mode-dados','mode-tarefas');
  wp.classList.add('mode-'+m);
  document.querySelectorAll('.wp-mobile-tabs button').forEach(function(b){
    b.classList.toggle('active', b.dataset.m===m);
  });
  // Trocar conteúdo do lado direito conforme aba
  var side = document.getElementById('wpSide');
  var conv = state.conversaAtiva;
  var c = null;
  if(conv){
    for(var i=0;i<state.contatos.length;i++){
      if(telWhats(state.contatos[i].telefone||'') === conv.numero_cliente){ c = state.contatos[i]; break; }
    }
  }
  if(!c || !side) return;
  if(m==='tarefas'){
    carregarAnotacoes(c.id).then(function(){ side.innerHTML = renderWpTarefas(c); });
  } else if(m==='dados'){
    side.innerHTML = renderWpDados(c);
  }
}

async function salvarContatoWP(id){
  var c = contatoDe(id);
  if(!c) return;
  c.nome = val('wp_nome').trim();
  c.telefone = val('wp_tel').trim();
  c.cidade = val('wp_cidade').trim();
  c.negocio = val('wp_neg');
  c.origem = val('wp_ori');
  c.valor = Number(val('wp_valor'))||0;
  c.etapa_id = Number(val('wp_etapa'));
  c.observacoes = val('wp_obs').trim();
  await _salvar('crm_contatos', c);
  render();
  toast('Salvo ✓');
}
async function excluirContatoWP(id){
  if(!confirm('Excluir este contato? A conversa continua salva.')) return;
  await _deletar('crm_contatos', id);
  state.contatos = state.contatos.filter(function(c){ return c.id!==id; });
  fecharWorkpanel();
  render();
  toast('Contato excluído');
}

function editarContato(id){
  var c = id ? contatoDe(id) : { id:0, nome:'', telefone:'', cidade:'', negocio:'', origem:'', etapa_id:(state.etapas[0]?state.etapas[0].id:0), valor:0, observacoes:'' };
  var h = '<h2>'+(id?'Editar contato':'Novo contato')+'</h2>';
  h += campo('c_nome','Nome*', c.nome);
  h += campo('c_tel','Telefone (com DDD)', c.telefone);
  h += campo('c_cidade','Cidade', c.cidade);
  h += selectCampo('c_neg','Negócio', NEGOCIOS, c.negocio);
  h += selectCampo('c_ori','Origem', ORIGENS, c.origem);
  h += selectEtapa('c_etapa', c.etapa_id);
  h += campo('c_valor','Valor (R$)', c.valor, 'number');
  h += '<div class="field"><label>Observações</label><textarea id="c_obs">'+esc(c.observacoes||'')+'</textarea></div>';
  h += '<div class="modal-actions"><button class="btn ghost" onclick="fecharModal()">Cancelar</button>';
  h += '<button class="btn" onclick="salvarContato('+(id||0)+')">Salvar</button></div>';
  abrirModal(h);
}
async function salvarContato(id){
  var nome = val('c_nome').trim();
  if(!nome){ toast('Informe o nome'); return; }
  var existente = id ? contatoDe(id) : null;
  var c = {
    id: id || novoId(), nome: nome,
    telefone: val('c_tel').trim(), cidade: val('c_cidade').trim(),
    negocio: val('c_neg'), origem: val('c_ori'),
    etapa_id: Number(val('c_etapa')), valor: Number(val('c_valor'))||0,
    observacoes: val('c_obs').trim(),
    ultimo_contato: existente ? existente.ultimo_contato : null,
    criado_em: existente ? existente.criado_em : new Date().toISOString()
  };
  await _salvar('crm_contatos', c);
  if(id){ for(var i=0;i<state.contatos.length;i++){ if(state.contatos[i].id===id) state.contatos[i]=c; } }
  else state.contatos.push(c);
  fecharModal(); render(); toast('Contato salvo');
}
async function excluirContato(id){
  if(!confirm('Excluir este contato?')) return;
  await _deletar('crm_contatos', id);
  state.contatos = state.contatos.filter(function(c){ return c.id!==id; });
  fecharModal(); render(); toast('Contato excluído');
}
