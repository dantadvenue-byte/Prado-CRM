// Envio de mídia via Evolution
// ============================================================
function blobParaBase64(blob){
  return new Promise(function(resolve, reject){
    var r = new FileReader();
    r.onload = function(){ resolve(String(r.result).split(',')[1]); };
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}
async function enviarMidiaEvolution(tipoEvo, blob, nomeArq, caption){
  var conv = state.conversaAtiva;
  if(!conv) throw new Error('Sem conversa ativa');
  var b64 = await blobParaBase64(blob);
  var url, body;
  if(tipoEvo === 'audio'){
    url = EVOLUTION_URL + '/message/sendWhatsAppAudio/' + conv.instancia;
    body = { number: conv.numero_cliente, audio: b64 };
  } else {
    url = EVOLUTION_URL + '/message/sendMedia/' + conv.instancia;
    body = {
      number: conv.numero_cliente,
      mediatype: tipoEvo,
      mimetype: blob.type || (tipoEvo==='image' ? 'image/jpeg' : 'application/octet-stream'),
      caption: caption || '',
      media: b64,
      fileName: nomeArq || (tipoEvo + '_' + Date.now())
    };
  }
  var r = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':EVOLUTION_API_KEY},
    body: JSON.stringify(body)
  });
  if(!r.ok){ throw new Error('HTTP '+r.status); }
  return r.json();
}
async function salvarMidiaNoStorage(blob, extensao){
  var nomeArq = 'out-' + Date.now() + '.' + extensao;
  var up = await sb.storage.from('crm-midia').upload(nomeArq, blob, {contentType: blob.type});
  if(up.error){ console.error(up.error); return null; }
  return sb.storage.from('crm-midia').getPublicUrl(nomeArq).data.publicUrl;
}
async function persistirMensagemEnviada(tipo, midiaUrl, mime, texto, messageId){
  var conv = state.conversaAtiva;
  var agora = new Date().toISOString();
  var msg = {
    id: novoId(), conversa_id: conv.id, instancia: conv.instancia,
    message_id: messageId || ('local-'+Date.now()), de_mim: true, tipo: tipo,
    texto: texto || '', midia_url: midiaUrl, midia_mime: mime,
    timestamp_msg: agora
  };
  await _salvar('crm_mensagens', msg);
  var preview = tipo === 'text' ? (texto||'').slice(0,80) : ('[' + tipo + ']');
  await _update('crm_conversas', conv.id, { ultima_mensagem: preview, ultima_hora: agora });
  if(!state.mensagens[conv.id]) state.mensagens[conv.id]=[];
  state.mensagens[conv.id].push(msg);
  conv.ultima_mensagem = preview;
  conv.ultima_hora = agora;
  renderMensagens(); scrollChatFim();
}
// Estado da mídia pendente pra enviar (fluxo estilo WhatsApp)
var midiaPendente = null;
var enviandoAnexo = false; // trava de reentrância: impede envio duplicado por toque duplo

// Redimensiona/comprime imagem antes de enviar (foto de celular tem vários MB).
// Corta drasticamente o tempo de envio e o travamento da thread. Se algo falhar,
// devolve o arquivo original — nunca bloqueia o envio.
function comprimirImagem(file, maxDim, quality){
  return new Promise(function(resolve){
    if(!file || file.type.indexOf('image/') !== 0 || file.type.indexOf('gif') >= 0){
      resolve(file); return;
    }
    try {
      var objUrl = URL.createObjectURL(file);
      var img = new Image();
      img.onload = function(){
        try {
          var w = img.naturalWidth, h = img.naturalHeight;
          var escala = Math.min(1, maxDim / Math.max(w, h));
          var nw = Math.max(1, Math.round(w*escala)), nh = Math.max(1, Math.round(h*escala));
          var canvas = document.createElement('canvas');
          canvas.width = nw; canvas.height = nh;
          canvas.getContext('2d').drawImage(img, 0, 0, nw, nh);
          URL.revokeObjectURL(objUrl);
          canvas.toBlob(function(blob){
            if(blob && blob.size < file.size) resolve(blob);
            else resolve(file); // se não reduziu, mantém o original
          }, 'image/jpeg', quality);
        } catch(err){ URL.revokeObjectURL(objUrl); resolve(file); }
      };
      img.onerror = function(){ URL.revokeObjectURL(objUrl); resolve(file); };
      img.src = objUrl;
    } catch(err){ resolve(file); }
  });
}

async function onArquivoAnexo(ev){
  var f = ev.target.files[0]; ev.target.value='';
  if(!f || !state.conversaAtiva) return;
  var eImagem = f.type.indexOf('image/') === 0;
  var eVideo = f.type.indexOf('video/') === 0;
  var tipoEvo = eImagem ? 'image' : (eVideo ? 'video' : 'document');

  // Se for imagem/video, mostra preview inline na barra pra digitar legenda
  if(eImagem || eVideo){
    midiaPendente = { arquivo: f, tipo: tipoEvo, preview: null };
    // Gera preview local
    var reader = new FileReader();
    reader.onload = function(e){
      midiaPendente.preview = e.target.result;
      montarBarraComAnexo();
    };
    reader.readAsDataURL(f);
    return;
  }
  // Documento: manda direto (sem legenda)
  if(enviandoAnexo) return; // evita duplo envio
  enviandoAnexo = true;
  toast('Enviando...');
  try {
    var resp = await enviarMidiaEvolution('document', f, f.name, '');
    var messageId = (resp && resp.key && resp.key.id) ? resp.key.id : null;
    var ext = f.name.split('.').pop() || 'bin';
    var url = await salvarMidiaNoStorage(f, ext);
    await persistirMensagemEnviada('document', url, f.type, f.name, messageId);
    toast('Enviado ✓');
  } catch(e){ console.error(e); toast('Erro ao enviar: '+e.message); }
  finally { enviandoAnexo = false; }
}

    };
  }
}

function cancelarAnexo(){
  midiaPendente = null;
  restaurarBarraInput();
}

async function enviarComAnexo(){
  if(enviandoAnexo) return; // já tem um envio em andamento — ignora toque/Enter duplicado
  if(!midiaPendente || !state.conversaAtiva) return;
  enviandoAnexo = true;

  var f = midiaPendente.arquivo;
  var tipo = midiaPendente.tipo;
  var input = document.getElementById('msgInput');
  var caption = input ? input.value.trim() : '';
  var previewLocal = midiaPendente.preview; // data URL local, mostra na hora
  var conv = state.conversaAtiva;

  var btn = document.getElementById('btnEnviarAnexo');
  if(btn) btn.disabled = true;

  // Limpa a barra imediatamente — não dá pra reenviar o mesmo anexo
  midiaPendente = null;
  restaurarBarraInput();

  // 1) Placeholder otimista: aparece na hora com o preview local (mata a sensação de travamento)
  var agora = new Date().toISOString();
  var msgLocal = {
    id: novoId(), conversa_id: conv.id, instancia: conv.instancia,
    message_id: 'local-'+Date.now(), de_mim: true, tipo: tipo,
    texto: caption||'', midia_url: previewLocal, midia_mime: f.type,
    timestamp_msg: agora, _enviando: true
  };
  if(!state.mensagens[conv.id]) state.mensagens[conv.id] = [];
  state.mensagens[conv.id].push(msgLocal);
  renderMensagens(); scrollChatFim();

  try {
    // 2) Comprime imagem antes de enviar (corta os ~20s)
    var blobEnvio = (tipo === 'image') ? await comprimirImagem(f, 1600, 0.7) : f;
    // 3) Envia pro WhatsApp
    var resp = await enviarMidiaEvolution(tipo, blobEnvio, f.name, caption);
    var messageId = (resp && resp.key && resp.key.id) ? resp.key.id : msgLocal.message_id;
    // 4) Sobe a mídia (já comprimida) no Storage
    var ext = (tipo === 'image') ? 'jpg' : (f.name.split('.').pop() || 'bin');
    var url = await salvarMidiaNoStorage(blobEnvio, ext) || previewLocal;
    // 5) Atualiza o MESMO placeholder — não cria segunda cópia
    msgLocal.message_id = messageId;
    msgLocal.midia_url = url;
    msgLocal._enviando = false;
    // Persiste a linha (o realtime da própria inserção é deduplicado por id)
    await _salvar('crm_mensagens', {
      id: msgLocal.id, conversa_id: conv.id, instancia: conv.instancia,
      message_id: messageId, de_mim: true, tipo: tipo,
      texto: caption||'', midia_url: url, midia_mime: f.type, timestamp_msg: agora
    });
    var preview = '[' + tipo + ']';
    await _update('crm_conversas', conv.id, { ultima_mensagem: preview, ultima_hora: agora });
    conv.ultima_mensagem = preview; conv.ultima_hora = agora;
    renderMensagens();
    toast('Enviado ✓');
  } catch(e){
    console.error(e);
    msgLocal._enviando = false; msgLocal._erro = true;
    renderMensagens();
    toast('Erro ao enviar: '+e.message);
  } finally {
    enviandoAnexo = false;
  }
}

// Gravação
var gravador = { rec:null, chunks:[], stream:null, iniciouEm:0, timer:null, ativo:false };
async function toggleGravacao(){
  if(gravador.ativo){ pararGravacaoEEnviar(); return; }
  if(!state.conversaAtiva) return;
  try {
    var stream = await navigator.mediaDevices.getUserMedia({audio:true});
    gravador.stream = stream; gravador.chunks = [];
    var mimes = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4'];
    var mimeEscolhido = '';
    for(var i=0;i<mimes.length;i++){ if(MediaRecorder.isTypeSupported(mimes[i])){ mimeEscolhido = mimes[i]; break; } }
    var rec = mimeEscolhido ? new MediaRecorder(stream, {mimeType: mimeEscolhido}) : new MediaRecorder(stream);
    rec.ondataavailable = function(e){ if(e.data && e.data.size>0) gravador.chunks.push(e.data); };
    rec.onstop = function(){ stream.getTracks().forEach(function(t){ t.stop(); }); };
    rec.start();
    gravador.rec = rec; gravador.iniciouEm = Date.now(); gravador.ativo = true;
    montarBarraGravando();
    gravador.timer = setInterval(atualizarTempoGrav, 250);
  } catch(e){ console.error(e); toast('Precisa permitir o microfone'); }
}
function montarBarraGravando(){
  var bar = document.getElementById('chatInputBar');
  if(!bar) return;
  bar.innerHTML =
    '<div class="rec-bar">' +
      '<span class="rec-dot"></span><span>Gravando</span>' +
      '<span class="rec-time" id="recTime">0:00</span>' +
      '<div style="flex:1"></div>' +
      '<button onclick="cancelarGravacao()">Cancelar</button>' +
    '</div>' +
    '<button id="btnEnviarAudio" title="Enviar áudio">➤</button>';
  document.getElementById('btnEnviarAudio').onclick = pararGravacaoEEnviar;
}
function atualizarTempoGrav(){
  var el = document.getElementById('recTime'); if(!el) return;
  var s = Math.floor((Date.now() - gravador.iniciouEm)/1000);
  var mm = Math.floor(s/60), ss = s%60;
  el.textContent = mm + ':' + (ss<10?'0':'') + ss;
}
function restaurarBarraInput(){
  clearInterval(gravador.timer); gravador.timer=null;
  gravador.ativo = false;
  var bar = document.getElementById('chatInputBar');
  if(!bar) return;
  bar.innerHTML =
    '<button class="aux" id="btnAnexar" title="Anexar imagem/arquivo">'+icon('paperclip',18)+'</button>' +
    '<button class="aux" id="btnProntas" title="Mensagens prontas">'+icon('bolt',18)+'</button>' +
    '<textarea id="msgInput" placeholder="Digite uma mensagem..." rows="1"></textarea>' +
    '<button class="aux" id="btnGravar" title="Gravar áudio">'+icon('mic',18)+'</button>' +
    '<button id="btnEnviar" title="Enviar">'+icon('send',18)+'</button>' +
    '<input type="file" id="fileAnexo" accept="image/*,application/pdf,video/*" style="display:none">';
  ligarChatEvents();
}
function cancelarGravacao(){
  if(!gravador.rec) return;
  try { gravador.rec.stop(); } catch(e){}
  restaurarBarraInput(); toast('Gravação cancelada');
}
async function pararGravacaoEEnviar(){
  if(!gravador.rec || !gravador.ativo) return;
  var rec = gravador.rec; var chunks = gravador.chunks;
  var mime = rec.mimeType || 'audio/webm';
  var stopped = new Promise(function(res){ rec.addEventListener('stop', function(){ res(); }, {once:true}); });
  rec.stop(); await stopped;
  var blob = new Blob(chunks, {type: mime});
  restaurarBarraInput();
  if(blob.size < 500){ toast('Áudio muito curto'); return; }
  toast('Enviando áudio...');
  try {
    var resp = await enviarMidiaEvolution('audio', blob, null, '');
    var messageId = (resp && resp.key && resp.key.id) ? resp.key.id : null;
    var url = await salvarMidiaNoStorage(blob, mime.indexOf('ogg')>-1?'ogg':(mime.indexOf('mp4')>-1?'m4a':'webm'));
    await persistirMensagemEnviada('audio', url, mime, '', messageId);
    toast('Áudio enviado ✓');
  } catch(e){ console.error(e); toast('Erro ao enviar áudio: '+e.message); }
}

// Prontas
function iconePronta(tipo){
  if(tipo==='audio') return icon('mic',14);
  if(tipo==='image') return icon('image',14);
  return icon('file_text',14);
}
function prontasDisponiveis(){
  var conv = state.conversaAtiva; if(!conv) return [];
  var negocio = null;
  for(var i=0;i<state.contatos.length;i++){
    if(telWhats(state.contatos[i].telefone||'') === conv.numero_cliente){
      negocio = state.contatos[i].negocio; break;
    }
  }
  return state.prontas.filter(function(p){
    if(!negocio) return true;
    return (p.negocio||'Geral')==='Geral' || (p.negocio||'')===negocio;
  });
}
function toggleProntasPop(){
  var existente = document.getElementById('prontasPop');
  if(existente){ existente.remove(); return; }
  var lista = prontasDisponiveis();
  var pop = document.createElement('div');
  pop.id = 'prontasPop'; pop.className = 'prontas-pop';
  var h = '<div class="ph"><span style="font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px">'+icon('bolt',14)+' Prontas</span>';
  h += '<div style="flex:1"></div>';
  h += '<button title="Fechar" onclick="document.getElementById(\'prontasPop\').remove()" style="width:24px;height:24px;background:transparent;color:var(--muted);font-size:16px;padding:0">✕</button>';
  h += '</div><div class="pl">';
  if(lista.length===0){
    h += '<div class="empty" style="padding:30px 12px;font-size:12.5px">Nenhuma pronta cadastrada.<br><small>Vá em <b>Prontas</b> pra criar.</small></div>';
  } else {
    for(var i=0;i<lista.length;i++){
      var p = lista[i];
      var sub = p.tipo==='text' ? (p.texto||'').slice(0,60) : ('['+p.tipo+']'+(p.texto?' — '+p.texto.slice(0,40):''));
      h += '<div class="pronta-item" onclick="usarPronta('+p.id+')">';
      h += '<span class="ico">'+iconePronta(p.tipo)+'</span>';
      h += '<div class="txt"><div class="nm">'+esc(p.nome)+'</div><div class="sub">'+esc(sub)+'</div></div>';
      h += '</div>';
    }
  }
  h += '</div>';
  pop.innerHTML = h;
  var bar = document.getElementById('chatInputBar');
  if(bar) bar.appendChild(pop);
  setTimeout(function(){
    document.addEventListener('click', function fechar(ev){
      var p = document.getElementById('prontasPop');
      if(p && !p.contains(ev.target)){ p.remove(); document.removeEventListener('click', fechar); }
    });
  }, 100);
}
function contatoDaConversa(){
  var conv = state.conversaAtiva; if(!conv) return null;
  for(var i=0;i<state.contatos.length;i++){
    if(telWhats(state.contatos[i].telefone||'') === conv.numero_cliente) return state.contatos[i];
  }
  return { nome: conv.nome_cliente || '', cidade:'', negocio:'' };
}
async function usarPronta(id){
  var p = achar(state.prontas, id); if(!p) return;
  var pop = document.getElementById('prontasPop'); if(pop) pop.remove();
  var c = contatoDaConversa();
  var textoAplicado = aplicarVars(p.texto||'', c);
  if(p.tipo==='text'){
    var input = document.getElementById('msgInput');
    if(input){
      input.value = (input.value ? input.value + ' ' : '') + textoAplicado;
      input.focus();
      input.style.height='auto';
      input.style.height = Math.min(120, input.scrollHeight)+'px';
    }
    // Dispara automações vinculadas ao envio dessa pronta
    // Nota: pra texto, disparamos quando você APERTA enviar, não quando cola no input
    // Então guardo a intenção e disparo em enviarMensagem
    if(c) state.ultimaProntaUsada = { pronta_id: p.id, contato_id: c.id };
    return;
  }
  state.pendentePreview = { pronta: p, textoAplicado: textoAplicado };
  mostrarPreview(p, textoAplicado);
}
function mostrarPreview(p, textoAplicado){
  var bar = document.getElementById('chatInputBar');
  if(!bar) return;
  var h = '<div class="preview-bar">';
  if(p.tipo==='audio'){
    h += '<span class="lbl" style="display:inline-flex;align-items:center;gap:6px">'+icon('mic',13)+' '+esc(p.nome)+'</span>';
    h += '<audio controls src="'+esc(p.midia_url)+'"></audio>';
  } else if(p.tipo==='image'){
    h += '<img src="'+esc(p.midia_url)+'" alt="prévia">';
    h += '<textarea id="prevLegenda" placeholder="Legenda (opcional)">'+esc(textoAplicado||'')+'</textarea>';
  }
  h += '<div class="act">';
  h += '<button class="cancel" onclick="cancelarPreview()">Cancelar</button>';
  h += '<button class="btn sm" onclick="confirmarPreview()">Enviar</button>';
  h += '</div></div>';
  bar.innerHTML = h;
}
function cancelarPreview(){ state.pendentePreview = null; restaurarBarraInput(); }
async function confirmarPreview(){
  var pp = state.pendentePreview;
  if(!pp){ restaurarBarraInput(); return; }
  var p = pp.pronta;
  var legenda = pp.textoAplicado || '';
  if(p.tipo==='image'){
    var el = document.getElementById('prevLegenda');
    if(el) legenda = el.value;
  }
  toast('Enviando...'); restaurarBarraInput();
  try {
    var resp = await fetch(p.midia_url);
    var blob = await resp.blob();
    var envio = await enviarMidiaEvolution(p.tipo, blob, p.nome, legenda);
    var messageId = (envio && envio.key && envio.key.id) ? envio.key.id : null;
    await persistirMensagemEnviada(p.tipo, p.midia_url, p.midia_mime, p.tipo==='image'?legenda:'', messageId);
    toast('Enviado ✓');
    // Dispara automações vinculadas ao envio dessa pronta
    var cAtivo = contatoDaConversa();
    if(cAtivo){
      dispararAutomacoesAoEnviarPronta(p.id, cAtivo.id);
    }
  } catch(e){ console.error(e); toast('Erro ao enviar: '+e.message); }
  state.pendentePreview = null;
}

async function enviarMensagem(){
  var input = document.getElementById('msgInput'); if(!input) return;
  var texto = input.value.trim();
  if(!texto || !state.conversaAtiva) return;
  var btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  var conv = state.conversaAtiva;
  var agora = new Date().toISOString();
  try {
    var r = await fetch(EVOLUTION_URL+'/message/sendText/'+conv.instancia, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':EVOLUTION_API_KEY},
      body: JSON.stringify({number: conv.numero_cliente, text: texto})
    });
    if(!r.ok){ throw new Error('HTTP '+r.status); }
    var resp = await r.json();
    var messageId = (resp && resp.key && resp.key.id) ? resp.key.id : ('local-'+Date.now());
    var msg = {
      id: novoId(), conversa_id: conv.id, instancia: conv.instancia,
      message_id: messageId, de_mim: true, tipo:'text',
      texto: texto, midia_url:null, midia_mime:null,
      timestamp_msg: agora
    };
    await _salvar('crm_mensagens', msg);
    var preview = texto.slice(0,80);
    await _update('crm_conversas', conv.id, { ultima_mensagem: preview, ultima_hora: agora });
    if(!state.mensagens[conv.id]) state.mensagens[conv.id]=[];
    var jaTem = false, arr = state.mensagens[conv.id];
    for(var i=0;i<arr.length;i++){ if(arr[i].message_id===messageId){ jaTem = true; break; } }
    if(!jaTem) arr.push(msg);
    conv.ultima_mensagem = preview; conv.ultima_hora = agora;
    input.value=''; input.style.height='auto';
    renderMensagens(); scrollChatFim();
    // Dispara automações vinculadas à última pronta usada (se ainda for a mesma conversa)
    if(state.ultimaProntaUsada){
      var u = state.ultimaProntaUsada;
      var cAtivo = contatoDaConversa();
      if(cAtivo && cAtivo.id === u.contato_id){
        dispararAutomacoesAoEnviarPronta(u.pronta_id, u.contato_id);
      }
      state.ultimaProntaUsada = null;
    }
  } catch(e){ console.error(e); toast('Erro ao enviar: '+e.message); }
  finally { btn.disabled = false; }
}

async function abrirConversaContato(cid){
  var c = contatoDe(cid);
  if(!c || !c.telefone){ toast('Contato sem telefone'); return; }
  var num = telWhats(c.telefone);
  // Escolhe a conexão certa baseado no negócio do contato
  var instancia = conexaoParaContato(c);
  if(!instancia){ toast('Nenhuma conexão cadastrada. Vá em 🔗 Conexões pra adicionar.'); trocarTab('conexoes'); return; }
  var conv = null;
  for(var i=0;i<state.conversas.length;i++){
    if(state.conversas[i].instancia===instancia && state.conversas[i].numero_cliente===num){
      conv=state.conversas[i]; break;
    }
  }
  if(!conv && sb){
    var r = await sb.from('crm_conversas').select('*')
      .eq('instancia', instancia).eq('numero_cliente', num).maybeSingle();
    if(r.data){ conv = r.data; state.conversas.unshift(conv); }
  }
  if(!conv){
    conv = {
      id: novoId(), instancia: instancia, numero_cliente: num,
      nome_cliente: c.nome, contato_id: c.id, ultima_mensagem:'', ultima_hora: new Date().toISOString(), nao_lidas:0
    };
    await _salvar('crm_conversas', conv);
    state.conversas.unshift(conv);
  }
  trocarTab('conversas');
  setTimeout(function(){ abrirConversa(conv.id); }, 30);
}

function viewProntas(){
  var negocios = ['Geral'].concat(NEGOCIOS);
  var filtro = state.prontasNegocioFiltro || 'Todos';
  var lista = state.prontas.slice();
  if(filtro !== 'Todos'){ lista = lista.filter(function(p){ return (p.negocio||'Geral')===filtro; }); }
  var h = pheaderHtml('Prontas');
  h += '<div class="toolbar">';
  h += '<span class="muted">'+lista.length+' pronta(s)</span>';
  h += '<select class="mini" id="filtroNeg" style="background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:6px 10px;border-radius:8px">';
  h += '<option'+(filtro==='Todos'?' selected':'')+'>Todos</option>';
  for(var i=0;i<negocios.length;i++){
    h += '<option'+(filtro===negocios[i]?' selected':'')+'>'+esc(negocios[i])+'</option>';
  }
  h += '</select>';
  h += '<div style="flex:1"></div>';
  h += '<button class="btn sm" onclick="editarPronta()">+ Nova pronta</button>';
  h += '</div>';
  if(lista.length===0){
    h += '<div class="empty">Nenhuma pronta ainda. Clique em <b>+ Nova pronta</b> pra cadastrar mensagens, áudios e imagens que você usa com frequência.</div>';
    return h;
  }
  h += '<div class="grid">';
  for(var j=0;j<lista.length;j++){
    var p = lista[j];
    h += '<div class="msgcard">';
    h += '<div class="row" style="justify-content:space-between;align-items:center">';
    h += '<h3>'+iconePronta(p.tipo)+' '+esc(p.nome)+'</h3>';
    h += '<span class="pill">'+esc(p.negocio||'Geral')+'</span>';
    h += '</div>';
    if(p.tipo==='audio' && p.midia_url){
      h += '<audio controls src="'+esc(p.midia_url)+'"></audio>';
    } else if(p.tipo==='image' && p.midia_url){
      h += '<img src="'+esc(p.midia_url)+'" style="max-width:100%;max-height:160px;border-radius:8px;object-fit:cover">';
      if(p.texto) h += '<div class="body">'+esc(p.texto)+'</div>';
    } else if(p.tipo==='text'){
      h += '<div class="body">'+esc(p.texto||'')+'</div>';
    }
    h += '<div class="row">';
    h += '<button class="iconbtn" onclick="editarPronta('+p.id+')">Editar</button>';
    h += '<button class="iconbtn" onclick="excluirPronta('+p.id+')">Excluir</button>';
    h += '</div></div>';
  }
  h += '</div>';
  setTimeout(function(){
    var el = document.getElementById('filtroNeg');
    if(el) el.onchange = function(){ state.prontasNegocioFiltro = el.value; render(); };
  }, 30);
  return h;
}
function editarPronta(id){
  var p = id ? achar(state.prontas, id) : { id:0, nome:'', negocio:'Geral', tipo:'text', texto:'', midia_url:null, midia_mime:null };
  var h = '<h2>'+(id?'Editar pronta':'Nova pronta')+'</h2>';
  h += campo('p_nome','Nome*', p.nome);
  h += selectCampo('p_neg','Negócio', ['Geral'].concat(NEGOCIOS), p.negocio||'Geral');
  h += '<div class="field"><label>Tipo</label><select id="p_tipo">';
  var tipos = [['text','Texto'],['audio','Áudio'],['image','Imagem']];
  for(var i=0;i<tipos.length;i++){
    h += '<option value="'+tipos[i][0]+'"'+(p.tipo===tipos[i][0]?' selected':'')+'>'+tipos[i][1]+'</option>';
  }
  h += '</select></div>';
  h += '<div id="p_camposTexto" class="field"><label>Texto</label>';
  h += '<textarea id="p_texto">'+esc(p.texto||'')+'</textarea>';
  h += '<div class="varhint">Variáveis: {primeiro}, {nome}, {cidade}, {negocio}</div></div>';
  h += '<div id="p_camposMidia" class="field" style="display:'+(p.tipo==='text'?'none':'block')+'">';
  h += '<label>Arquivo '+(p.midia_url?'(atual: ✓ carregado)':'*')+'</label>';
  h += '<input type="file" id="p_arquivo" accept="'+(p.tipo==='audio'?'audio/*':'image/*')+'">';
  h += '</div>';
  h += '<div class="modal-actions"><button class="btn ghost" onclick="fecharModal()">Cancelar</button>';
  h += '<button class="btn" onclick="salvarPronta('+(id||0)+')">Salvar</button></div>';
  abrirModal(h);
  setTimeout(function(){
    var sel = document.getElementById('p_tipo');
    if(sel) sel.onchange = function(){
      var t = sel.value;
      var midia = document.getElementById('p_camposMidia');
      if(t==='text'){ midia.style.display='none'; }
      else {
        midia.style.display='block';
        document.getElementById('p_arquivo').setAttribute('accept', t==='audio'?'audio/*':'image/*');
      }
    };
  }, 30);
}
async function salvarPronta(id){
  var nome = val('p_nome').trim();
  if(!nome){ toast('Informe o nome'); return; }
  var existente = id ? achar(state.prontas, id) : null;
  var tipo = val('p_tipo');
  var negocio = val('p_neg');
  var texto = val('p_texto').trim();
  var arq = document.getElementById('p_arquivo');
  var midia_url = existente ? existente.midia_url : null;
  var midia_mime = existente ? existente.midia_mime : null;
  if(tipo!=='text' && arq && arq.files[0]){
    var f = arq.files[0];
    var ext = f.name.split('.').pop() || (tipo==='audio'?'ogg':'jpg');
    var nomeArq = 'pronta-'+Date.now()+'.'+ext;
    toast('Enviando arquivo...');
    var up = await sb.storage.from('crm-midia').upload(nomeArq, f, {contentType: f.type});
    if(up.error){ console.error(up.error); toast('Falha no upload'); return; }
    midia_url = sb.storage.from('crm-midia').getPublicUrl(nomeArq).data.publicUrl;
    midia_mime = f.type;
  }
  if(tipo!=='text' && !midia_url){ toast('Selecione o arquivo'); return; }
  if(tipo==='text' && !texto){ toast('Escreva o texto'); return; }
  var p = {
    id: id || novoId(), nome: nome, negocio: negocio, tipo: tipo,
    texto: texto, midia_url: midia_url, midia_mime: midia_mime,
    ordem: existente ? existente.ordem : (state.prontas.length),
    criado_em: existente ? existente.criado_em : new Date().toISOString()
  };
  await _salvar('crm_prontas', p);
  if(id){ for(var i=0;i<state.prontas.length;i++){ if(state.prontas[i].id===id) state.prontas[i]=p; } }
  else state.prontas.push(p);
  fecharModal(); render(); toast('Pronta salva');
}
async function excluirPronta(id){
  if(!confirm('Excluir esta pronta?')) return;
  await _deletar('crm_prontas', id);
  state.prontas = state.prontas.filter(function(p){ return p.id!==id; });
  render(); toast('Excluída');
}

// ============================================================
// PUSH NOTIFICATIONS (Fase 5.8) — PWA + Service Worker + Web Push
// ============================================================
// Fluxo:
// 1. Ao carregar CRM, registra o Service Worker
// 2. Usuário clica "Ativar notificações" → pede permissão → registra subscription no Supabase
// 3. Quando chega mensagem nova (via realtime), chama Edge Function que envia push pra todos
// 4. Service Worker mostra notificação no celular/desktop mesmo com CRM fechado

var pushSubscription = null;
var pushSuportado = ('serviceWorker' in navigator) && ('PushManager' in window);

async function registrarServiceWorker(){
  if(!pushSuportado){
    console.log('Push não suportado neste navegador');
    return null;
  }
  try {
    var reg = await navigator.serviceWorker.register('service-worker.js');
    console.log('Service Worker registrado:', reg.scope);
    return reg;
  } catch(e){
    console.error('Erro registrando SW:', e);
    return null;
  }
}

async function verificarSubscription(){
  if(!pushSuportado) return null;
  var reg = await navigator.serviceWorker.ready;
  var sub = await reg.pushManager.getSubscription();
  pushSubscription = sub;
  return sub;
}

function urlBase64ToUint8Array(base64String){
  var padding = '='.repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  var rawData = atob(base64);
  var outputArray = new Uint8Array(rawData.length);
  for(var i = 0; i < rawData.length; i++){
    outputArray[i] = rawData.charCodeAt(i);
  }
  return outputArray;
}

// Inscreve no push manager e salva no Supabase (idempotente).
// Compartilhado entre ativação manual e reinscrição automática no boot.
async function criarSubscriptionESalvar(){
  var reg = await navigator.serviceWorker.ready;
  var sub = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
  });
  var subJson = sub.toJSON();
  // Upsert por endpoint (se já existe, não duplica)
  var jaExiste = await sb.from('crm_push_subscriptions').select('id')
    .eq('endpoint', subJson.endpoint).maybeSingle();
  if(!jaExiste.data){
    await _salvar('crm_push_subscriptions', {
      id: novoId(),
      endpoint: subJson.endpoint,
      p256dh: subJson.keys.p256dh,
      auth: subJson.keys.auth,
      user_agent: navigator.userAgent.slice(0, 200),
      criado_em: new Date().toISOString(),
      ultimo_uso: new Date().toISOString()
    });
  }
  pushSubscription = sub;
  return sub;
}

async function ativarNotificacoes(){
  if(!pushSuportado){
    alert('Este navegador não suporta notificações push. Use Chrome no Android, ou Safari no iPhone (iOS 16.4+).');
    return;
  }
  try {
    var perm = await Notification.requestPermission();
    if(perm !== 'granted'){
      toast('Permissão negada. Ative nas configurações do navegador.');
      return;
    }
    await criarSubscriptionESalvar();
    // Guarda a intenção do usuário: no próximo boot, se a subscription tiver
    // sumido (comum no iOS ao fechar o PWA), reinscrevemos em silêncio.
    try { localStorage.setItem('crm_push_ativado', '1'); } catch(e){}
    toast('🔔 Notificações ativadas neste dispositivo!');
    atualizarBotaoNotif();
  } catch(e){
    console.error('Erro ativando push:', e);
    toast('Erro: '+e.message);
  }
}

async function desativarNotificacoes(){
  try { localStorage.removeItem('crm_push_ativado'); } catch(e){}
  if(!pushSubscription){ atualizarBotaoNotif(); toast('Notificações já estão desativadas'); return; }
  try {
    var endpoint = pushSubscription.endpoint;
    await pushSubscription.unsubscribe();
    if(sb) await sb.from('crm_push_subscriptions').delete().eq('endpoint', endpoint);
    pushSubscription = null;
    atualizarBotaoNotif();
    toast('Notificações desativadas');
  } catch(e){
    console.error(e);
    toast('Erro: '+e.message);
  }
}

function atualizarBotaoNotif(){
  var btn = document.getElementById('btnNotif');
  if(!btn) return;
  var ping = btn.querySelector('.ping');
  if(pushSubscription){
    btn.title = 'Notificações ATIVAS (clique pra desativar)';
    btn.classList.add('ativo');
    if(ping) ping.style.display = 'inline-block';
  } else {
    btn.title = 'Ativar notificações push';
    btn.classList.remove('ativo');
    if(ping) ping.style.display = 'none';
  }
}

function toggleNotificacoes(){
  if(pushSubscription) desativarNotificacoes();
  else ativarNotificacoes();
}

// Dispara push pra todos os dispositivos
async function dispararPushMensagem(msg, contato, conversa){
  if(!msg || msg.de_mim) return; // só notifica mensagens recebidas
  var nome = (contato && contato.nome) || (conversa && conversa.nome_cliente) || conversa.numero_cliente || 'Cliente';
  var texto = '';
  if(msg.tipo === 'text') texto = (msg.texto||'').slice(0, 100);
  else if(msg.tipo === 'audio') texto = '🎤 Áudio';
  else if(msg.tipo === 'image') texto = '📷 Imagem';
  else texto = '📎 Anexo';

  try {
    await fetch(PUSH_FUNCTION_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer '+SUPABASE_ANON_KEY
      },
      body: JSON.stringify({
        titulo: nome,
        mensagem: texto,
        url: './',
        conversa_id: conversa ? conversa.id : null
      })
    });
  } catch(e){ console.error('Erro disparando push:', e); }
}

// Inicialização — chamada no boot
async function iniciarPush(){
  if(!pushSuportado) return;
  await registrarServiceWorker();
  await verificarSubscription();
  // O usuário quer push? (ativou em algum momento)
  var queria = false;
  try { queria = localStorage.getItem('crm_push_ativado') === '1'; } catch(e){}
  if(queria && ('Notification' in window) && Notification.permission === 'granted'){
    // Revalida SEMPRE: o iOS às vezes derruba a subscription real mas getSubscription()
    // ainda devolve uma "fantasma" (o sino fica aceso, mas o endpoint está morto e o
    // servidor manda pro vazio). criarSubscriptionESalvar() reinscreve e regrava o
    // endpoint atual no Supabase (idempotente por endpoint).
    try {
      await criarSubscriptionESalvar();
      console.log('Push: subscription revalidada no boot');
    } catch(e){
      console.error('Falha ao revalidar subscription:', e);
    }
  }
  atualizarBotaoNotif();
}

async function salvarAutomacao(id){
  var nome = val('a_nome').trim();
  if(!nome){ toast('Informe o nome'); return; }
  var contatoIdRaw = val('a_contato');
  var contatoId = contatoIdRaw ? Number(contatoIdRaw) : null;
  var gtipo = val('a_gtipo');
  var atipo = val('a_atipo');
  var gdados = {};
  var adados = {};

  if(gtipo === 'data_hora'){
    var dt = val('a_gd_data');
    if(!dt){ toast('Informe a data'); return; }
    gdados.data = new Date(dt).toISOString();
  } else if(gtipo === 'ao_enviar_pronta'){
    var pid = val('a_gd_pronta');
    if(!pid){ toast('Escolha uma pronta pro gatilho'); return; }
    gdados.pronta_id = Number(pid);
  }

  if(atipo === 'enviar_pronta'){
    var pid2 = val('a_ad_pronta');
    if(!pid2){ toast('Escolha uma pronta pra ação'); return; }
    adados.pronta_id = Number(pid2);
    if(!contatoId){ toast('Vincule a um contato pra poder enviar pronta'); return; }
  } else if(atipo === 'mover_etapa'){
    var eid = val('a_ad_etapa');
    if(!eid){ toast('Escolha uma etapa'); return; }
    adados.etapa_id = Number(eid);
    if(!contatoId){ toast('Vincule a um contato pra poder mover etapa'); return; }
  }

  var existente = id ? achar(state.automacoes, id) : null;
  var a = {
    id: id || novoId(),
    nome: nome,
    contato_id: contatoId,
    gatilho_tipo: gtipo,
    gatilho_dados: gdados,
    acao_tipo: atipo,
    acao_dados: adados,
    ativa: existente ? existente.ativa : true,
    executada_em: existente ? existente.executada_em : null,
    criado_em: existente ? existente.criado_em : new Date().toISOString()
  };
  await _salvar('crm_automacoes', a);
  if(id){ for(var i=0;i<state.automacoes.length;i++){ if(state.automacoes[i].id===id) state.automacoes[i]=a; } }
  else state.automacoes.push(a);
  fecharModal();
  atualizarBadgeAuto();
  render();
  refreshWpUnificado();
  toast('Automação salva');
}

var loopAutoTimer = null;
function iniciarLoopAutomacoes(){
  if(loopAutoTimer) clearInterval(loopAutoTimer);
  loopAutoTimer = setInterval(checarAutomacoesTempo, 30000);
  setTimeout(checarAutomacoesTempo, 3000);
}

// Checa gatilhos de data/hora
async function checarAutomacoesTempo(){
  var agora = new Date();
  var pendentes = state.automacoes.filter(function(a){
    if(!a.ativa || a.executada_em) return false;
    if(a.gatilho_tipo !== 'data_hora') return false;
    var d = a.gatilho_dados && a.gatilho_dados.data;
    if(!d) return false;
    return new Date(d) <= agora;
  });
  for(var i=0;i<pendentes.length;i++){
    await executarAutomacao(pendentes[i]);
  }
}

// Chamado quando você envia uma pronta pelo chat — dispara automações de gatilho "ao_enviar_pronta"
async function dispararAutomacoesAoEnviarPronta(prontaId, contatoId){
  var candidatas = state.automacoes.filter(function(a){
    if(!a.ativa || a.executada_em) return false;
    if(a.gatilho_tipo !== 'ao_enviar_pronta') return false;
    if(a.gatilho_dados.pronta_id !== prontaId) return false;
    // Se a automação tem contato_id, tem que bater
    if(a.contato_id && a.contato_id !== contatoId) return false;
    return true;
  });
  for(var i=0;i<candidatas.length;i++){
    var a = candidatas[i];
    // Se automação não tem contato mas tem ação que exige, usa o contato do envio
    if(!a.contato_id) a.contato_id = contatoId;
    await executarAutomacao(a);
  }
}

async function executarAutomacao(a){
  try {
    if(a.acao_tipo === 'mover_etapa'){
      var c = contatoDe(a.contato_id);
      if(c && a.acao_dados && a.acao_dados.etapa_id){
        c.etapa_id = a.acao_dados.etapa_id;
        c.ultimo_contato = new Date().toISOString();
        await _salvar('crm_contatos', c);
      }
    } else if(a.acao_tipo === 'enviar_pronta'){
      var c2 = contatoDe(a.contato_id);
      var p = a.acao_dados && a.acao_dados.pronta_id ? achar(state.prontas, a.acao_dados.pronta_id) : null;
      if(c2 && p && c2.telefone){
        await enviarProntaDireto(c2, p);
      }
    }
    // Marca como executada
    a.executada_em = new Date().toISOString();
    await _update('crm_automacoes', a.id, { executada_em: a.executada_em });
    toast('🤖 Automação: '+a.nome);
    atualizarBadgeAuto();
    if(state.tab === 'automacoes') render();
    refreshWpUnificado();
  } catch(e){
    console.error('Erro executando automação', a.nome, e);
  }
}

// Envio direto (sem prévia) — usado pelo motor de automação
async function enviarProntaDireto(contato, p){
  var num = telWhats(contato.telefone);
  var instancia = conexaoParaContato(contato);
  if(!instancia){ toast('Sem conexão pra este negócio'); return; }
  // Procura ou cria conversa
  var conv = null;
  for(var i=0;i<state.conversas.length;i++){
    if(state.conversas[i].instancia===instancia && state.conversas[i].numero_cliente===num){
      conv = state.conversas[i]; break;
    }
  }
  if(!conv){
    conv = {
      id: novoId(), instancia: instancia, numero_cliente: num,
      nome_cliente: contato.nome, contato_id: contato.id,
      ultima_mensagem: '', ultima_hora: new Date().toISOString(), nao_lidas: 0
    };
    await _salvar('crm_conversas', conv);
    state.conversas.unshift(conv);
  }
  var textoAplicado = aplicarVars(p.texto||'', contato);
  var agora = new Date().toISOString();

  if(p.tipo === 'text'){
    var r = await fetch(EVOLUTION_URL+'/message/sendText/'+instancia, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':EVOLUTION_API_KEY},
      body: JSON.stringify({number: num, text: textoAplicado})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    var resp = await r.json();
    var messageId = (resp && resp.key && resp.key.id) ? resp.key.id : ('local-'+Date.now());
    var msg = {
      id: novoId(), conversa_id: conv.id, instancia: instancia,
      message_id: messageId, de_mim: true, tipo:'text',
      texto: textoAplicado, midia_url:null, midia_mime:null,
      timestamp_msg: agora
    };
    await _salvar('crm_mensagens', msg);
    await _update('crm_conversas', conv.id, { ultima_mensagem: textoAplicado.slice(0,80), ultima_hora: agora });
    if(!state.mensagens[conv.id]) state.mensagens[conv.id]=[];
    state.mensagens[conv.id].push(msg);
  } else {
    // Áudio ou imagem — baixa do Storage e envia
    var respMidia = await fetch(p.midia_url);
    var blob = await respMidia.blob();
    var url, body;
    if(p.tipo === 'audio'){
      url = EVOLUTION_URL + '/message/sendWhatsAppAudio/' + instancia;
      var b64a = await blobParaBase64(blob);
      body = { number: num, audio: b64a };
    } else {
      url = EVOLUTION_URL + '/message/sendMedia/' + instancia;
      var b64i = await blobParaBase64(blob);
      body = {
        number: num, mediatype: p.tipo,
        mimetype: blob.type || 'image/jpeg',
        caption: textoAplicado || '', media: b64i,
        fileName: p.nome || (p.tipo+'_'+Date.now())
      };
    }
    var r2 = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':EVOLUTION_API_KEY},
      body: JSON.stringify(body)
    });
    if(!r2.ok) throw new Error('HTTP '+r2.status);
    var resp2 = await r2.json();
    var mid = (resp2 && resp2.key && resp2.key.id) ? resp2.key.id : ('local-'+Date.now());
    var msg2 = {
      id: novoId(), conversa_id: conv.id, instancia: instancia,
      message_id: mid, de_mim: true, tipo: p.tipo,
      texto: p.tipo==='image'?textoAplicado:'',
      midia_url: p.midia_url, midia_mime: p.midia_mime,
      timestamp_msg: agora
    };
    await _salvar('crm_mensagens', msg2);
    await _update('crm_conversas', conv.id, { ultima_mensagem: '['+p.tipo+']', ultima_hora: agora });
    if(!state.mensagens[conv.id]) state.mensagens[conv.id]=[];
    state.mensagens[conv.id].push(msg2);
  }
}

// ============================================================
// Uma "conexão" = 1 chip = 1 instância no Evolution
// Cada conexão pode atender vários negócios (Motos STM + Starlink, por ex)

function conexaoDe(id){
  for(var i=0;i<state.conexoes.length;i++){ if(state.conexoes[i].id===id) return state.conexoes[i]; }
  return null;
}
function conexaoPorInstancia(inst){
  for(var i=0;i<state.conexoes.length;i++){ if(state.conexoes[i].instancia===inst) return state.conexoes[i]; }
  return null;
}
// Pega instância padrão (primeira conectada, ou primeira da lista)
function instanciaAtual(){
  var conectada = null;
  for(var i=0;i<state.conexoes.length;i++){
    if(state.conexoes[i].status==='conectado'){ conectada = state.conexoes[i]; break; }
  }
  if(conectada) return conectada.instancia;
  if(state.conexoes.length > 0) return state.conexoes[0].instancia;
  return null;
}
// Escolhe qual conexão usar pra um contato: filtra pelas conexões que atendem o negócio dele
function conexaoParaContato(c){
  if(!c) return instanciaAtual();
  if(c.negocio){
    for(var i=0;i<state.conexoes.length;i++){
      var negs = state.conexoes[i].negocios || [];
      if(negs.indexOf(c.negocio) >= 0) return state.conexoes[i].instancia;
    }
  }
  return instanciaAtual();
}

  var h = '<div class="conexao-card '+statusClass+'">';

  h += '<div class="cxc-icon">'+statusIcon+'</div>';
  h += '<div class="cxc-info">';
  h += '<div class="cxc-nome">'+esc(c.nome_display)+'</div>';
  h += '<div class="cxc-inst">Instância: <code>'+esc(c.instancia)+'</code></div>';
  if(c.telefone) h += '<div class="cxc-tel">'+icon('phone',12)+' '+esc(c.telefone)+'</div>';
  h += '</div>';
  h += '<div class="cxc-status">'+statusLabel+'</div>';
  h += '</div>';

  if(negs.length > 0){
    h += '<div class="cxc-negs">';
    for(var i=0;i<negs.length;i++){ h += '<span class="cxc-neg">'+esc(negs[i])+'</span>'; }
    h += '</div>';
  } else {
    h += '<div class="cxc-negs"><span class="cxc-neg-vazio">⚠️ Sem negócios vinculados</span></div>';
  }

  h += '<div class="cxc-actions">';
  if(c.status!=='conectado'){
    h += '<button class="btn sm" onclick="abrirQRCode('+c.id+')">'+icon('qr',14)+' Conectar</button>';
  } else {
    h += '<button class="btn ghost sm" onclick="verificarConexao('+c.id+')">'+icon('refresh',14)+' Verificar</button>';
    h += '<button class="btn ghost sm" onclick="desconectarChip('+c.id+')">Desconectar</button>';
  }
  h += '<button class="btn ghost sm" onclick="editarConexao('+c.id+')">Editar</button>';
  h += '<div style="flex:1"></div>';
  h += '<button class="btn danger sm" onclick="excluirConexao('+c.id+')">'+icon('trash',14)+'</button>';

}

async function salvarConexao(id){
  var nome = val('cx_nome').trim();
  var inst = val('cx_inst').trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
  if(!nome || !inst){ toast('Preencha nome e instância'); return; }

  // Coleta negócios
  var negs = [];
  document.querySelectorAll('.chip-negocios input[type="checkbox"]:checked').forEach(function(cb){
    negs.push(cb.dataset.neg);
  });

  var existente = id ? conexaoDe(id) : null;
  // Se é criação, tenta criar instância no Evolution
  if(!id){
    try {
      toast('Criando instância no Evolution...');
      var r = await fetch(EVOLUTION_URL+'/instance/create', {
        method: 'POST',
        headers: {'Content-Type':'application/json','apikey':EVOLUTION_API_KEY},
        body: JSON.stringify({
          instanceName: inst,
          qrcode: true,
          integration: 'WHATSAPP-BAILEYS'
        })
      });
      if(!r.ok){
        var errText = await r.text();
        // Se já existe, tudo bem — só reaproveita
        if(errText.indexOf('already') < 0 && errText.indexOf('exists') < 0){
          throw new Error('Evolution: '+errText);
        }
      }
    } catch(e){
      toast('Erro ao criar: '+e.message);
      return;
    }
  }

  var c = {
    id: id || novoId(),
    nome_display: nome,
    instancia: inst,
    negocios: negs,
    telefone: existente ? existente.telefone : null,
    status: existente ? existente.status : 'desconectado',
    ordem: existente ? existente.ordem : state.conexoes.length,
    criado_em: existente ? existente.criado_em : new Date().toISOString()
  };
  await _salvar('crm_conexoes', c);
  if(id){ for(var i=0;i<state.conexoes.length;i++){ if(state.conexoes[i].id===id) state.conexoes[i]=c; } }
  else state.conexoes.push(c);
  fecharModal();
  atualizarBadgeConexoes();
  render();
  toast('Conexão salva ✓');
  // Se é criação nova, já abre o QR
  if(!id){ setTimeout(function(){ abrirQRCode(c.id); }, 500); }
}

async function excluirConexao(id){
  var c = conexaoDe(id); if(!c) return;
  if(!confirm('Excluir a conexão "'+c.nome_display+'"?\n\nIsso NÃO apaga a instância no Evolution — só remove ela do CRM. As conversas ficam mas não conseguirão mais enviar mensagens por essa instância.')) return;
  await _deletar('crm_conexoes', id);
  state.conexoes = state.conexoes.filter(function(x){ return x.id!==id; });
  atualizarBadgeConexoes();
  render();
  toast('Conexão removida');
}

// ==== QR CODE ====
async function abrirQRCode(id){
  var c = conexaoDe(id); if(!c) return;
  var h = '<h2>Conectar '+esc(c.nome_display)+'</h2>';
  h += '<div class="qr-box" id="qrBox">';
  h += '<div class="empty" style="padding:20px">Buscando QR code...</div>';
  h += '</div>';
  h += '<div class="qr-help" id="qrHelp">Abra o WhatsApp no seu celular → ⋮ → <b>Dispositivos conectados</b> → <b>Conectar um dispositivo</b> → escaneie o código acima</div>';
  h += '<div class="modal-actions"><button class="btn ghost" onclick="pararPollQR();fecharModal()">Fechar</button>';
  h += '<button class="btn" onclick="carregarQRCode('+id+')">'+icon('refresh',14)+' Novo QR</button></div>';
  abrirModal(h);
  setTimeout(function(){ carregarQRCode(id); }, 100);
}

var pollQRTimer = null;
function pararPollQR(){ if(pollQRTimer){ clearInterval(pollQRTimer); pollQRTimer=null; } }

async function carregarQRCode(id){
  var c = conexaoDe(id); if(!c) return;
  var box = document.getElementById('qrBox');
  if(box) box.innerHTML = '<div class="empty" style="padding:20px">Gerando...</div>';
  try {
    // 1) Chama connect pra pegar QR
    var r = await fetch(EVOLUTION_URL+'/instance/connect/'+c.instancia, {
      method: 'GET',
      headers: {'apikey': EVOLUTION_API_KEY}
    });
    if(!r.ok){ throw new Error('HTTP '+r.status); }
    var data = await r.json();
    // data.base64 vem com "data:image/png;base64,..."
    if(data && data.base64){
      if(box){
        box.innerHTML = '<img src="'+data.base64+'" alt="QR" class="qr-img">';
      }
      // Marca como conectando
      c.status = 'conectando';
      await _update('crm_conexoes', c.id, { status: 'conectando' });
      // Inicia polling pra ver se conectou
      pararPollQR();
      pollQRTimer = setInterval(function(){ verificarStatusInterno(c.id); }, 3000);
    } else if(data && data.instance && data.instance.state === 'open'){
      // Já está conectado
      if(box) box.innerHTML = '<div class="empty" style="padding:20px;color:var(--accent2)">✓ Já conectado!</div>';
      c.status = 'conectado';
      await _update('crm_conexoes', c.id, { status: 'conectado' });
      render();
    } else {
      if(box) box.innerHTML = '<div class="empty" style="padding:20px">Sem QR retornado. Tente novamente.</div>';
    }
  } catch(e){
    if(box) box.innerHTML = '<div class="empty" style="padding:20px;color:var(--danger)">Erro: '+esc(e.message)+'</div>';
  }
}

async function verificarStatusInterno(id){
  var c = conexaoDe(id); if(!c) return;
  try {
    var r = await fetch(EVOLUTION_URL+'/instance/connectionState/'+c.instancia, {
      method: 'GET',
      headers: {'apikey': EVOLUTION_API_KEY}
    });
    var data = await r.json();
    var estado = data && data.instance && data.instance.state;
    if(estado === 'open'){
      pararPollQR();
      c.status = 'conectado';
      // Tenta pegar o número do telefone
      try {
        var r2 = await fetch(EVOLUTION_URL+'/instance/fetchInstances?instanceName='+c.instancia, {
          method: 'GET',
          headers: {'apikey': EVOLUTION_API_KEY}
        });
        var arr = await r2.json();
        if(arr && arr[0] && arr[0].ownerJid){
          c.telefone = arr[0].ownerJid.split('@')[0];
        }
      } catch(e){}
      await _update('crm_conexoes', c.id, { status: 'conectado', telefone: c.telefone });
      var box = document.getElementById('qrBox');
      if(box) box.innerHTML = '<div class="empty" style="padding:30px;color:var(--accent2);font-size:16px">✓ Conectado com sucesso!</div>';
      render();
      toast('🎉 '+c.nome_display+' conectado!');
    }
  } catch(e){ /* silencia — próximo poll tenta de novo */ }
}

async function verificarConexao(id){
  await verificarStatusInterno(id);
  toast('Status atualizado');
}

async function desconectarChip(id){
  var c = conexaoDe(id); if(!c) return;
  if(!confirm('Desconectar '+c.nome_display+'?')) return;
  try {
    await fetch(EVOLUTION_URL+'/instance/logout/'+c.instancia, {
      method: 'DELETE',
      headers: {'apikey': EVOLUTION_API_KEY}
    });
  } catch(e){}
  c.status = 'desconectado';
  await _update('crm_conexoes', c.id, { status: 'desconectado' });
  render();
  toast('Desconectado');
}

function atualizarBadgeConexoes(){
  var desconectadas = state.conexoes.filter(function(c){ return c.status !== 'conectado'; }).length;
  var b = document.getElementById('badgeConexoes');

function agruparTarefas(){
  var agora = new Date();
  var hojeIni = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
  var amanhaIni = new Date(hojeIni); amanhaIni.setDate(amanhaIni.getDate()+1);
  var depoisAmanha = new Date(hojeIni); depoisAmanha.setDate(depoisAmanha.getDate()+2);
  var semanaFim = new Date(hojeIni); semanaFim.setDate(semanaFim.getDate()+7);

  var vencidas = [], hoje = [], amanha = [], estaSemana = [], futuras = [], concluidas = [];
  var pend = state.tarefas.filter(function(t){ return !t.concluida; });
  pend.sort(function(a,b){ return new Date(a.vence_em) - new Date(b.vence_em); });
  for(var i=0;i<pend.length;i++){
    var t = pend[i];
    var v = new Date(t.vence_em);
    if(v < agora) vencidas.push(t);
    else if(v < amanhaIni) hoje.push(t);
    else if(v < depoisAmanha) amanha.push(t);
    else if(v < semanaFim) estaSemana.push(t);
    else futuras.push(t);
  }
  concluidas = state.tarefas.filter(function(t){ return t.concluida; })
    .sort(function(a,b){ return new Date(b.concluida_em||b.vence_em) - new Date(a.concluida_em||a.vence_em); })
    .slice(0, 20);
  return { vencidas:vencidas, hoje:hoje, amanha:amanha, estaSemana:estaSemana, futuras:futuras, concluidas:concluidas };
}

function editarTarefa(id, contatoId){
  var t = id ? achar(state.tarefas, id) : null;

  h += campo('t_titulo','Título*', t?t.titulo:'');

  h += '<div class="field"><label>Vincular a um contato</label><select id="t_contato">';
  h += '<option value="">— Sem contato específico —</option>';

    var c = state.contatos[i];
    h += '<option value="'+c.id+'"'+(c.id===contatoAtivo?' selected':'')+'>'+esc(c.nome)+'</option>';
  }

}

function proximaHoraCheia(){
  var d = new Date();
  d.setMinutes(0,0,0);
  d.setHours(d.getHours()+1);
  return d.toISOString();
}
function dtLocalStr(iso){
  if(!iso) return '';
  var d = new Date(iso);
  var pad = function(n){ return n<10?'0'+n:n; };
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}
async function salvarTarefa(id){
  var titulo = val('t_titulo').trim();
  if(!titulo){ toast('Informe o título'); return; }
  var venceRaw = val('t_vence');
  if(!venceRaw){ toast('Informe a data'); return; }
  var vence = new Date(venceRaw).toISOString();
  var contatoIdRaw = val('t_contato');
  var contatoId = contatoIdRaw ? Number(contatoIdRaw) : null;
  var desc = val('t_desc').trim();
  var existente = id ? achar(state.tarefas, id) : null;
  var novoVence = vence !== (existente ? existente.vence_em : null);
  var t = {
    id: id || novoId(),
    contato_id: contatoId,
    titulo: titulo,
    descricao: desc,
    vence_em: vence,
    concluida: existente ? existente.concluida : false,
    concluida_em: existente ? existente.concluida_em : null,
    notificada: existente && !novoVence ? existente.notificada : false,
    criado_em: existente ? existente.criado_em : new Date().toISOString()
  };
  await _salvar('crm_tarefas', t);
  if(id){ for(var i=0;i<state.tarefas.length;i++){ if(state.tarefas[i].id===id) state.tarefas[i]=t; } }
  else state.tarefas.push(t);
  fecharModal(); atualizarBadgeTarefas(); render();
  // Se estava com painel aberto, re-renderiza aba tarefas
  if(document.getElementById('workover').classList.contains('show') && state.wpTab==='tarefas'){
    refreshWpUnificado();
  }
  toast('Tarefa salva');
}
async function toggleTarefa(id){
  var t = achar(state.tarefas, id); if(!t) return;
  t.concluida = !t.concluida;
  t.concluida_em = t.concluida ? new Date().toISOString() : null;
  await _salvar('crm_tarefas', t);
  atualizarBadgeTarefas();
  render();
  if(document.getElementById('workover').classList.contains('show') && state.wpTab==='tarefas'){
    refreshWpUnificado();
  }
}
async function excluirTarefa(id){
  if(!confirm('Excluir esta tarefa?')) return;
  await _deletar('crm_tarefas', id);
  state.tarefas = state.tarefas.filter(function(t){ return t.id!==id; });
  atualizarBadgeTarefas();
  render();
  if(document.getElementById('workover').classList.contains('show') && state.wpTab==='tarefas'){
    refreshWpUnificado();
  }
}

function atualizarBadgeTarefas(){
  var agora = new Date();
  var hojeFim = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate(), 23, 59, 59);
  var criticas = state.tarefas.filter(function(t){
    if(t.concluida) return false;
    return new Date(t.vence_em) <= hojeFim;
  }).length;
  var b = document.getElementById('badgeTarefas');
  if(!b) return;
  if(criticas>0){ b.textContent = criticas>99?'99+':criticas; b.style.display='inline-block'; }
  else b.style.display='none';
}

// ---------- Anotações ----------
async function carregarAnotacoes(contatoId){
  if(state.anotacoes[contatoId]) return state.anotacoes[contatoId];
  var r = await _ler('crm_anotacoes', {eq:{contato_id:contatoId}, order:{col:'criado_em', asc:false}});
  state.anotacoes[contatoId] = r;
  return r;
}
async function adicionarAnotacao(contatoId){
  var input = document.getElementById('wp_anot_input');
  if(!input) return;
  var texto = input.value.trim();
  if(!texto) return;
  var a = { id: novoId(), contato_id: contatoId, texto: texto, criado_em: new Date().toISOString() };
  await _salvar('crm_anotacoes', a);
  if(!state.anotacoes[contatoId]) state.anotacoes[contatoId] = [];
  state.anotacoes[contatoId].unshift(a);
  input.value = '';
  refreshWpUnificado();
  toast('Anotação salva');
}
async function excluirAnotacao(id, contatoId){
  if(!confirm('Excluir anotação?')) return;
  await _deletar('crm_anotacoes', id);
  state.anotacoes[contatoId] = state.anotacoes[contatoId].filter(function(a){ return a.id !== id; });
  refreshWpUnificado();
}

function pedirPermissaoNotificacao(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    Notification.requestPermission();
  }
}
var loopNotifTimer = null;
function iniciarLoopNotificacoes(){
  if(loopNotifTimer) clearInterval(loopNotifTimer);
  loopNotifTimer = setInterval(checarTarefasVencendo, 30000);
  setTimeout(checarTarefasVencendo, 2000);
}
async function checarTarefasVencendo(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  var agora = new Date();
  var tarefasVencendo = state.tarefas.filter(function(t){
    if(t.concluida || t.notificada) return false;
    return new Date(t.vence_em) <= agora;
  });
  for(var i=0;i<tarefasVencendo.length;i++){
    var t = tarefasVencendo[i];
    var contato = t.contato_id ? contatoNome(t.contato_id) : 'sem contato';
    try {
      var n = new Notification('Tarefa: ' + t.titulo, {
        body: (t.contato_id ? ('com ' + contato) : '') + (t.descricao ? ' — ' + t.descricao : ''),
        tag: 'tarefa-' + t.id,
        requireInteraction: true
      });
      n.onclick = function(tarId){ return function(){
        window.focus();
        trocarTab('tarefas');
        n.close();
      }; }(t.id);
    } catch(e){ console.error('Erro na notificação:', e); }
    t.notificada = true;
    await _update('crm_tarefas', t.id, {notificada:true});
  }
}

// PRODUTOS (integração com Prado Analytics)
// ============================================================
// Mapa explícito: nome da loja no Analytics → nome do negócio no CRM
// Ajuste aqui se cadastrar novas lojas
var MAPA_LOJA_NEGOCIO = {
  'Mundial Santarém': 'Motos STM',
  'Mundial Belém': 'Motos Belém',
  'Mundial Itaituba': 'Motos ITB',
  'Norte Veículos': 'Carros',
  'Panda Store': 'Starlink',
  'Gold Mine': 'Gold Mine',
  'Brikes': 'Brikes',
  'Mundial Manaus Drop': 'Scooters Manaus'
};

// Descobre o "negócio" (STM/Belém/etc) a partir do loja_id do produto
function negocioDeLoja(lojaId){
  if(!lojaId) return null;
  var l = null;
  for(var i=0;i<state.lojas.length;i++){
    if(String(state.lojas[i].id) === String(lojaId) || String(state.lojas[i]._rowId) === String(lojaId)){
      l = state.lojas[i]; break;
    }
  }
  if(!l) return null;
  var nomeLoja = (l.nome || l.title || '').trim();
  // 1) Mapa explícito
  if(MAPA_LOJA_NEGOCIO[nomeLoja]) return MAPA_LOJA_NEGOCIO[nomeLoja];
  // 2) Fallback: match exato com algum negócio
  for(var j=0;j<NEGOCIOS.length;j++){
    if(NEGOCIOS[j] === nomeLoja) return NEGOCIOS[j];
  }
  return null;
}

function produtoDe(id){
  for(var i=0;i<state.produtos.length;i++){
    if(String(state.produtos[i].id) === String(id)) return state.produtos[i];
  }
  return null;
}

function produtosDoContato(contatoId){
  var vinculos = state.contatoProdutos.filter(function(v){ return v.contato_id===contatoId; });
  var lista = [];
  var vistos = {}; // evita exibir o mesmo produto duas vezes (defensivo contra vínculo duplicado antigo)
  for(var i=0;i<vinculos.length;i++){
    var pid = String(vinculos[i].produto_id);
    if(vistos[pid]) continue;
    var p = produtoDe(vinculos[i].produto_id);
    if(p){
      vistos[pid] = true;
      lista.push({ produto: p, vinculoId: vinculos[i].id });
    }
  }
  return lista;
}

function meuLucroLiquido(p){
  if(!p) return 0;
  var venda = Number(p.precoVenda || 0);
  var custo = Number(p.precoCusto || 0);
  var comissao = Number(p.comissao || 0);
  // Soma custos extras (objeto {chave: valor})
  var custosExtras = 0;
  if(p.custos && typeof p.custos === 'object'){
    for(var k in p.custos){
      if(p.custos.hasOwnProperty(k)) custosExtras += Number(p.custos[k] || 0);
    }
  }
  var lucroBruto = venda - custo - custosExtras - comissao;
  var pct = (p.meuLucroPct !== undefined && p.meuLucroPct !== null) ? Number(p.meuLucroPct) : 100;
  return lucroBruto * (pct / 100);
}

function valorPotencialContato(contatoId){
  var lista = produtosDoContato(contatoId);
  var total = 0;
  for(var i=0;i<lista.length;i++){ total += meuLucroLiquido(lista[i].produto); }
  return total;
}

async function vincularProduto(contatoId, produtoId){
  // Idempotente: se o produto já está vinculado a este contato, não cria outro
  var jaTem = state.contatoProdutos.some(function(v){
    return String(v.contato_id)===String(contatoId) && String(v.produto_id)===String(produtoId);
  });
  if(jaTem) return;
  var v = { id: novoId(), contato_id: contatoId, produto_id: produtoId, criado_em: new Date().toISOString() };
  await _salvar('crm_contato_produtos', v);
  state.contatoProdutos.push(v);
}
async function desvincularProduto(vinculoId){
  await _deletar('crm_contato_produtos', vinculoId);
  state.contatoProdutos = state.contatoProdutos.filter(function(v){ return v.id!==vinculoId; });
}

function abrirPickerProduto(contatoId){
  var c = contatoDe(contatoId); if(!c) return;
  var negocio = c.negocio;
  var jaVinculados = {};
  var vinculosContato = state.contatoProdutos.filter(function(v){ return v.contato_id===contatoId; });
  for(var i=0;i<vinculosContato.length;i++){ jaVinculados[vinculosContato[i].produto_id] = true; }

  var lista = state.produtos.slice();
  if(negocio){
    lista = lista.filter(function(p){
      var neg = negocioDeLoja(p.loja);
      return !neg || neg === negocio;
    });
  }
  // Ordena por nome
  lista.sort(function(a,b){ return (a.nome||'').localeCompare(b.nome||''); });

  var h = '<h2>Adicionar produto de interesse</h2>';
  h += '<p class="muted" style="font-size:12.5px;margin-bottom:14px">Selecione um ou mais produtos que este cliente tem interesse. Os produtos vêm do Prado Analytics.</p>';
  h += '<input id="pickerBusca" placeholder="Buscar produto..." style="width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:9px 12px;border-radius:10px;margin-bottom:14px">';
  h += '<div id="pickerLista" style="max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:6px">';
  h += renderPickerLista(lista, jaVinculados, contatoId);
  h += '</div>';
  h += '<div class="modal-actions"><button class="btn ghost" onclick="fecharModal()">Fechar</button></div>';
  abrirModal(h);
  setTimeout(function(){
    var busca = document.getElementById('pickerBusca');
    if(busca){
      busca.oninput = function(){
        var q = busca.value.toLowerCase().trim();
        var filtrada = lista.filter(function(p){ return (p.nome||'').toLowerCase().indexOf(q)>=0; });
        document.getElementById('pickerLista').innerHTML = renderPickerLista(filtrada, jaVinculados, contatoId);
      };
      busca.focus();
    }
  }, 40);
}

function renderPickerLista(lista, jaVinculados, contatoId){
  if(lista.length===0) return '<div class="empty" style="padding:20px">Nenhum produto encontrado.</div>';
  var h = '';
  for(var i=0;i<lista.length;i++){
    var p = lista[i];
    var esgotado = (Number(p.quantidade) <= 0);
    var vinculado = jaVinculados[p.id];
    var lucro = meuLucroLiquido(p);
    h += '<div class="produto-picker'+(vinculado?' vinculado':'')+'" '+(vinculado?'':('onclick="pickerAdicionar('+contatoId+','+p.id+')"'))+'>';
    h += '<div class="pp-info">';
    h += '<div class="pp-nome">'+esc(p.nome||'Sem nome')+'</div>';
    h += '<div class="pp-meta">💵 Meu lucro: R$ '+lucro.toLocaleString('pt-BR',{maximumFractionDigits:0})+' · Est: '+(p.quantidade||0)+(esgotado?' <span class="pp-esg">⚠️ Esgotado</span>':'')+'</div>';
    h += '</div>';
    h += '<div class="pp-btn">'+(vinculado?'✓ Já vinculado':'+ Adicionar')+'</div>';
    h += '</div>';
  }
  return h;
}

async function pickerAdicionar(contatoId, produtoId){
  await vincularProduto(contatoId, produtoId);
  toast('Produto adicionado ✓');

function abrirContato(id){
  var c = contatoDe(id); if(!c) return;
  var num = telWhats(c.telefone||'');
  if(!num){
    editarContato(id);
    return;
  }
  // No mobile abre direto em "detalhes"; desktop mostra Chat + lateral
  state.wpTab = (window.innerWidth < 900) ? 'detalhes' : 'chat';
  procurarOuCriarConversa(c, num).then(function(conv){
    state.conversaAtiva = conv;
    if(!state.mensagens[conv.id]){
      _ler('crm_mensagens', {eq:{conversa_id:conv.id}, order:{col:'timestamp_msg', asc:true}}).then(function(msgs){
        state.mensagens[conv.id] = msgs;
        renderWorkpanel(c, conv);
      });
    } else {
      renderWorkpanel(c, conv);
    }
    // Carrega anotações em background
    carregarAnotacoes(c.id);
  });
}
async function procurarOuCriarConversa(c, num){
  for(var i=0;i<state.conversas.length;i++){
    if(state.conversas[i].instancia===INSTANCIA_PADRAO && state.conversas[i].numero_cliente===num){
      return state.conversas[i];
    }
  }
  if(sb){
    var r = await sb.from('crm_conversas').select('*')
      .eq('instancia', INSTANCIA_PADRAO).eq('numero_cliente', num).maybeSingle();
    if(r.data){ state.conversas.unshift(r.data); return r.data; }
  }
  var conv = {
    id: novoId(), instancia: INSTANCIA_PADRAO, numero_cliente: num,
    nome_cliente: c.nome, contato_id: c.id, ultima_mensagem:'', ultima_hora: new Date().toISOString(), nao_lidas:0
  };
  await _salvar('crm_conversas', conv);
  state.conversas.unshift(conv);
  return conv;
}

  h += '<h3>'+icon('bot',16)+'Automações ('+automacoesContato.length+')</h3>';
  h += '<div style="flex:1"></div>';
  h += '<button class="btn sm" onclick="editarAutomacao(0, '+c.id+')">+ Nova</button>';
  h += '</div>';
  h += '<div class="wp-section-body">';
  if(automacoesContato.length===0){
    h += '<div class="empty" style="padding:20px 10px;font-size:12.5px">Nenhuma automação pra este contato.</div>';
  } else {
    h += '<div class="autos-lista">';
    for(var ak=0;ak<automacoesContato.length;ak++){ h += autoItem(automacoesContato[ak], false); }
    h += '</div>';
  }
  h += '</div></div>';

  // ==== SEÇÃO TAREFAS ====
  var tarefasContato = state.tarefas.filter(function(t){ return t.contato_id===c.id; })
    .sort(function(a,b){
      if(a.concluida !== b.concluida) return a.concluida ? 1 : -1;
      return new Date(a.vence_em) - new Date(b.vence_em);
    });
  h += '<div class="wp-section">';
  h += '<div class="wp-section-h">';
  h += '<h3>'+icon('pen',16)+'Tarefas ('+tarefasContato.length+')</h3>';
  h += '<div style="flex:1"></div>';
  h += '<button class="btn sm" onclick="editarTarefa(0, '+c.id+')">+ Nova</button>';
  h += '</div>';
  h += '<div class="wp-section-body">';
  if(tarefasContato.length===0){
    h += '<div class="empty" style="padding:20px 10px;font-size:12.5px">Nenhuma tarefa.</div>';
  } else {
    h += '<div class="tarefas-lista">';

    h += '</div>';
  }
  h += '</div></div>';

  return h;
}

function wpSubTab(s){
  state.wpTab = s;
  var conv = state.conversaAtiva;
  var c = null;
  if(conv){
    for(var i=0;i<state.contatos.length;i++){
      if(telWhats(state.contatos[i].telefone||'') === conv.numero_cliente){ c = state.contatos[i]; break; }
    }
  }
  if(!c) return;
  document.querySelectorAll('.wp-subtabs button[data-s]').forEach(function(b){
    b.classList.toggle('active', b.dataset.s===s);
  });
  var body = document.getElementById('wpSideBody');
  if(!body) return;
  if(s==='tarefas'){
    carregarAnotacoes(c.id).then(function(){ body.innerHTML = renderWpTarefas(c); });
  } else if(s==='produtos'){
    body.innerHTML = renderWpProdutos(c);
  } else {
    body.innerHTML = renderWpDados(c);
  }
}

  h += '<div class="wp-form">';

  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';

function refreshWpUnificado(){
  if(!document.getElementById('workover').classList.contains('show')) return;
  var c = null;
  var conv = state.conversaAtiva;
  if(conv){
    for(var i=0;i<state.contatos.length;i++){
      if(telWhats(state.contatos[i].telefone||'') === conv.numero_cliente){ c = state.contatos[i]; break; }
    }
  }
  if(!c) return;

function fecharWorkpanel(){
  document.getElementById('workover').classList.remove('show');
  state.conversaAtiva = null;
}

function wpMobileTab(m){
  state.wpTab = m;
  var wp = document.getElementById('workpanel');
  wp.classList.remove('mode-chat','mode-detalhes');
  wp.classList.add('mode-'+(m==='chat'?'chat':'detalhes'));
  document.querySelectorAll('.wp-mobile-tabs button[data-m]').forEach(function(b){

  });

async function salvarContatoWP(id){
  var c = contatoDe(id);
  if(!c) return;
  c.nome = val('wp_nome').trim();
  c.telefone = val('wp_tel').trim();
  c.cidade = val('wp_cidade').trim();
  c.negocio = val('wp_neg');
  c.origem = val('wp_ori');
  c.etapa_id = Number(val('wp_etapa'));
  c.observacoes = val('wp_obs').trim();
  await _salvar('crm_contatos', c);
  render();
  toast('Salvo ✓');
}
async function excluirContatoWP(id){
  if(!confirm('Excluir este contato? A conversa continua salva.')) return;
  await _deletar('crm_contatos', id);
  state.contatos = state.contatos.filter(function(c){ return c.id!==id; });
  fecharWorkpanel();
  render();
  toast('Contato excluído');
}

function editarContato(id){
  var c = id ? contatoDe(id) : { id:0, nome:'', telefone:'', cidade:'', negocio:'', origem:'', etapa_id:(state.etapas[0]?state.etapas[0].id:0), valor:0, observacoes:'' };
  var h = '<h2>'+(id?'Editar contato':'Novo contato')+'</h2>';
  h += campo('c_nome','Nome*', c.nome);
  h += campo('c_tel','Telefone (com DDD)', c.telefone);
  h += campo('c_cidade','Cidade', c.cidade);
  h += selectCampo('c_neg','Negócio', NEGOCIOS, c.negocio);
  h += selectCampo('c_ori','Origem', ORIGENS, c.origem);
  h += selectEtapa('c_etapa', c.etapa_id);
  h += '<div class="field"><label>Observações</label><textarea id="c_obs">'+esc(c.observacoes||'')+'</textarea></div>';
  h += '<div class="modal-actions"><button class="btn ghost" onclick="fecharModal()">Cancelar</button>';
  h += '<button class="btn" onclick="salvarContato('+(id||0)+')">Salvar</button></div>';
  abrirModal(h);
}
async function salvarContato(id){
  var nome = val('c_nome').trim();
  if(!nome){ toast('Informe o nome'); return; }
  var existente = id ? contatoDe(id) : null;
  var c = {
    id: id || novoId(), nome: nome,
    telefone: val('c_tel').trim(), cidade: val('c_cidade').trim(),
    negocio: val('c_neg'), origem: val('c_ori'),
    etapa_id: Number(val('c_etapa')),
    observacoes: val('c_obs').trim(),
    ultimo_contato: existente ? existente.ultimo_contato : null,
    criado_em: existente ? existente.criado_em : new Date().toISOString()
  };
  await _salvar('crm_contatos', c);
  if(id){ for(var i=0;i<state.contatos.length;i++){ if(state.contatos[i].id===id) state.contatos[i]=c; } }
  else state.contatos.push(c);
  fecharModal(); render(); toast('Contato salvo');
}
async function excluirContato(id){
  if(!confirm('Excluir este contato?')) return;
  await _deletar('crm_contatos', id);
  state.contatos = state.contatos.filter(function(c){ return c.id!==id; });
  fecharModal(); render(); toast('Contato excluído');
}

// ============================================================
// GERENCIAR ETAPAS
// ============================================================
function abrirGerenciarEtapas(){
  var h = '<h2>Gerenciar etapas do funil</h2>';
  h += '<p class="muted" style="font-size:12.5px;margin-bottom:14px">Renomeie, mude cor, adicione, remova ou reordene arrastando.</p>';
  h += '<div class="stage-mng" id="stageMng"></div>';
  h += '<div class="modal-actions">';
  h += '<button class="btn ghost" onclick="fecharModal()">Fechar</button>';
  h += '</div>';
  abrirModal(h);
  renderGerenciarEtapas();
}
function renderGerenciarEtapas(){
  var el = document.getElementById('stageMng');
  if(!el) return;
  // Contagem por etapa
  var contagem = {};
  for(var i=0;i<state.contatos.length;i++){
    var eid = state.contatos[i].etapa_id;
    contagem[eid] = (contagem[eid]||0) + 1;
  }
  var h = '';
  for(var i=0;i<state.etapas.length;i++){
    var e = state.etapas[i];
    var cnt = contagem[e.id] || 0;
    h += '<div class="stage-row" draggable="true" data-id="'+e.id+'">';
    h += '<span class="grip">⋮⋮</span>';
    h += '<input type="color" class="cor-input" value="'+esc(e.cor||'#10b981')+'" onchange="atualizarCorEtapa('+e.id+', this.value)">';
    h += '<input type="text" value="'+esc(e.nome)+'" onblur="atualizarNomeEtapa('+e.id+', this.value)">';
    h += '<span class="cnt">'+cnt+'</span>';
    h += '<button class="del" onclick="pedirExcluirEtapa('+e.id+')" title="Excluir">'+icon('trash',14)+'</button>';
    h += '</div>';
  }
  h += '<button class="stage-add" onclick="adicionarEtapa()">+ Adicionar etapa</button>';
  el.innerHTML = h;
  ligarDnDEtapas();
}
function ligarDnDEtapas(){
  var rows = document.querySelectorAll('.stage-row');
  var arrastando = null;
  rows.forEach(function(r){
    r.addEventListener('dragstart', function(){ arrastando=r; r.classList.add('dragging'); });
    r.addEventListener('dragend', function(){ r.classList.remove('dragging'); arrastando=null; });
    r.addEventListener('dragover', function(ev){ ev.preventDefault(); });
    r.addEventListener('drop', async function(ev){
      ev.preventDefault();
      if(!arrastando || arrastando===r) return;
      var idOrigem = Number(arrastando.dataset.id);
      var idDestino = Number(r.dataset.id);
      var iOrigem = -1, iDestino = -1;
      for(var k=0;k<state.etapas.length;k++){
        if(state.etapas[k].id===idOrigem) iOrigem = k;
        if(state.etapas[k].id===idDestino) iDestino = k;
      }
      if(iOrigem<0 || iDestino<0) return;
      var itemMovido = state.etapas.splice(iOrigem, 1)[0];
      state.etapas.splice(iDestino, 0, itemMovido);
      // Reindexa e salva
      for(var k=0;k<state.etapas.length;k++){
        state.etapas[k].ordem = k;
        await _salvar('crm_etapas', state.etapas[k]);
      }
      renderGerenciarEtapas();
      toast('Ordem atualizada');
    });
  });
}
async function atualizarNomeEtapa(id, nome){
  var e = etapaDe(id); if(!e) return;
  nome = (nome||'').trim();
  if(!nome){ toast('Nome não pode ser vazio'); renderGerenciarEtapas(); return; }
  e.nome = nome;
  await _salvar('crm_etapas', e);
  toast('Nome atualizado');
}
async function atualizarCorEtapa(id, cor){
  var e = etapaDe(id); if(!e) return;
  e.cor = cor;
  await _salvar('crm_etapas', e);
}
async function adicionarEtapa(){
  var e = { id: novoId(), nome: 'Nova etapa', ordem: state.etapas.length, cor: '#10b981' };
  await _salvar('crm_etapas', e);
  state.etapas.push(e);
  renderGerenciarEtapas();
  toast('Etapa adicionada');
}
function pedirExcluirEtapa(id){
  var e = etapaDe(id); if(!e) return;
  var contatosNaEtapa = state.contatos.filter(function(c){ return c.etapa_id===id; });
  if(contatosNaEtapa.length===0){
    // Sem contatos: exclui direto
    if(!confirm('Excluir a etapa "'+e.nome+'"?')) return;
    excluirEtapaExec(id, null);
    return;
  }
  // Com contatos: mostra escolha
  var h = '<h2>Excluir etapa "'+esc(e.nome)+'"</h2>';
  h += '<p class="muted" style="font-size:13px">Esta etapa tem <b style="color:var(--ink)">'+contatosNaEtapa.length+' contato(s)</b>. O que fazer com eles?</p>';
  h += '<div class="confirm-choice">';
  // Opção mover
  var outrasEtapas = state.etapas.filter(function(x){ return x.id !== id; });
  h += '<div style="margin-bottom:8px"><label class="muted" style="font-size:12px;display:block;margin-bottom:6px">Mover contatos pra:</label>';
  h += '<select id="destinoEtapa" style="width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:10px;border-radius:10px">';
  for(var i=0;i<outrasEtapas.length;i++){
    h += '<option value="'+outrasEtapas[i].id+'">'+esc(outrasEtapas[i].nome)+'</option>';
  }
  h += '</select></div>';
  h += '<button class="confirm-opt" onclick="excluirEtapaExec('+id+', Number(document.getElementById(\'destinoEtapa\').value))">';
  h += '<div class="ic">↪</div>';
  h += '<div class="tx"><div class="t1">Mover contatos e excluir etapa</div><div class="t2">Contatos vão pra etapa escolhida acima</div></div>';
  h += '</button>';
  h += '<button class="confirm-opt danger" onclick="confirmarExcluirTudo('+id+')">';
  h += '<div class="ic">'+icon('trash',18)+'</div>';
  h += '<div class="tx"><div class="t1">Excluir etapa E todos os contatos</div><div class="t2">Ação permanente — os contatos serão apagados</div></div>';
  h += '</button>';
  h += '<button class="confirm-opt" onclick="renderGerenciarEtapas()" style="justify-content:center">';
  h += '<div class="tx" style="text-align:center"><div class="t1">Cancelar</div></div>';
  h += '</button>';
  h += '</div>';
  document.getElementById('stageMng').innerHTML = h;
}
function confirmarExcluirTudo(id){
  if(confirm('Tem certeza? Todos os contatos desta etapa serão apagados permanentemente.')){
    excluirEtapaExec(id, 'delete');
  }
}
async function excluirEtapaExec(id, destinoOuAcao){
  var contatosNaEtapa = state.contatos.filter(function(c){ return c.etapa_id===id; });
  if(destinoOuAcao === 'delete'){
    // Deleta os contatos
    for(var i=0;i<contatosNaEtapa.length;i++){
      await _deletar('crm_contatos', contatosNaEtapa[i].id);
    }
    state.contatos = state.contatos.filter(function(c){ return c.etapa_id !== id; });
  } else if(typeof destinoOuAcao === 'number'){
    // Move os contatos
    for(var i=0;i<contatosNaEtapa.length;i++){
      contatosNaEtapa[i].etapa_id = destinoOuAcao;
      await _salvar('crm_contatos', contatosNaEtapa[i]);
    }
  }
  // Deleta a etapa
  await _deletar('crm_etapas', id);
  state.etapas = state.etapas.filter(function(e){ return e.id !== id; });
  renderGerenciarEtapas();
  render();
  toast('Etapa excluída');
}

// ============================================================
// UI helpers
// ============================================================
function achar(arr,id){ for(var i=0;i<arr.length;i++){ if(arr[i].id===id) return arr[i]; } return null; }
function val(id){ var e=document.getElementById(id); return e?e.value:''; }
function campo(id,label,valor,tipo){
  return '<div class="field"><label>'+label+'</label><input id="'+id+'" type="'+(tipo||'text')+'" value="'+esc(valor)+'"></div>';
}
function selectCampo(id,label,opts,sel){
  var h='<div class="field"><label>'+label+'</label><select id="'+id+'"><option value="">—</option>';
  for(var i=0;i<opts.length;i++){ h+='<option'+(opts[i]===sel?' selected':'')+'>'+esc(opts[i])+'</option>'; }
  return h+'</select></div>';
}
function selectEtapa(id,sel){
  var h='<div class="field"><label>Etapa</label><select id="'+id+'">';
  for(var i=0;i<state.etapas.length;i++){ var e=state.etapas[i]; h+='<option value="'+e.id+'"'+(e.id===sel?' selected':'')+'>'+esc(e.nome)+'</option>'; }
  return h+'</select></div>';
}
function abrirModal(html){ document.getElementById('modal').innerHTML=html; document.getElementById('overlay').classList.add('show'); }
function fecharModal(){ document.getElementById('overlay').classList.remove('show'); }
function ligarBuscaGlobal(){
  var el = document.getElementById('buscaGlobal');
  if(el){ el.oninput = function(){ state.busca = el.value; render(); }; }
}

document.getElementById('nav').addEventListener('click', function(ev){
  var b = ev.target.closest('.nav-item'); if(!b) return;

});

  if(ev.target.id==='overlay') fecharModal();
});
document.getElementById('workover').addEventListener('click', function(ev){

});
document.addEventListener('keydown', function(ev){
  if(ev.key === 'Escape'){
    if(document.getElementById('workover').classList.contains('show')) fecharWorkpanel();
    else if(document.getElementById('overlay').classList.contains('show')) fecharModal();
  }
});

carregarTudo();
